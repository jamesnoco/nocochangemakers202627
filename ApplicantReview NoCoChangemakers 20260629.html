hese last two jobs are not reflected on my resume. The seasonal/part time schedules allow me to continue with regulat volunteer commitments for the school district, Friends of the Poudre Libraries and UCHealth.", "references": "Amy Malara 970-214-1559 malaraamy000@gmail.com Leslee Gooch 970-846-5074 lesleeg@comcast.net"}, {"name": "Tiffani Sargent", "positionTitle": "Sales Manager", "employer": "Toll Brothers at Timnath Lakes/Heron Lakes", "email": "tsargent@tollbrothers.com", "phone": "(720) 305-6554", "howHeard": "Referral from Changemaker alumni  -  Chamber of Commerce communication  -  Referral from NoCo Foundation board or staff", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6582596066965310600/Tiffani Sargent- 6-25-26 Resume.pdf", "challenge": "Sometimes it takes just one break, one act of kindness or just a little generosity to make a big difference in someone\u2019s life. I have seen this happen numerous times and believe we can spread generosity and wealth throughout our communities through kindness, creativity and education. I believe philanthropy is a constant opportunity AND a major challenge in every community, and this is why programs like Changemakers are invaluable, to help us learn how to develop new ways to give back and to keep long-running charitable activities going strong with continued support and leadership. For example, my grandfather served as a Rotarian for more than 50 years and delivered food daily to seniors through meals on wheels until he was 87. And I have a good friend who started an organization called, Goodie Two Shoes to provide kids with new shoes in Las Vegas, and as of today, they have raised millions of dollars and provided hundreds of thousands of shoes to children, changing their lives daily, by giving them confidence and a new attitude both in and out of the classroom. And in both examples, it took just one person to enact impactful, and positive change that can gain momentum and grow into a massive movement.", "leadership": "As a former television news reporter in Las Vegas, I found I needed to find stories to help renew my own faith in humanity, especially during the recession. It seemed, we were only featuring foreclosures, unemployment, homicides, car accidents and robberies. So, I pushed to start a \u201cgood news\u201d segment. And after some lobbying, I started, \u201cPositively Las Vegas\u201d where I covered everything from pet rescues from foreclosures, to breast cancer survivors creating beautiful wigs for those losing their hair, to a 10-year-old making muffins for the homeless.  I received wonderful feedback and story suggestions from viewers all across the state.\n   My efforts even helped located a man with dementia who had wandered off in the hot desert, possibly saving his life.  I have learned paying it forward is addicting and contagious and I want to continue to help enact positive change.", "collaboration": "I recently graduated from Leadership Fort Collins, where we were challenged to make a difference through a class project. Our team worked closely with Neighbor to Neighbor and cleaned up their community garden, and held a fundraiser to help families with their utility bills. My role was not only to help coordinate these activities and participate in the physical clean up, but I also created a \u201cnews story\u201d or package, through video, interviews, music, graphics and a call- to-action for our final presentation. It felt awesome to give back and prompt others to do the same:)", "hopeToGain": "As a NoCo Changemaker, I really hope to get a greater perspective on how to make a greater impact within my community and beyond. Philanthropy has always been a big focus within my own family, and even my 11-year-old niece has her own candle business where she gives a portion of her proceeds to help others. And after 20 years of serving on boards, emceeing philanthropic events and reporting about changemakers in other states, I truly want to find ways to give back right here in NoCo where I hope to stay.", "optionalDetail": "I grew up in Northern Colorado surrounded by many of the people who helped create the NoCo Foundation 50 years ago.  And I am excited to learn from today's stellar Changemakers and see how I can continue the positive momentum.", "references": "Amanda Miller amanda@psc.biz 970.231.0316; Kari Lewis klewis1@tollbrothers.com 720.656.4036"}, {"name": "Travis Hitt", "positionTitle": "Executive Director", "employer": "The Crawford Child Advocacy Center", "email": "travish@crawfordcac.org", "phone": "(303) 522-8260", "howHeard": "Chamber of Commerce communication", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6575257595946077647/Travis Hitt - Resume.pdf", "challenge": "One of the biggest challenges facing Northern Colorado right now is the growing gap between need and capacity. As the cost of living rises and economic pressures mount, more people are turning to nonprofits and community organizations for support, but those same organizations are often operating with tighter budgets and leaner staff. The result is a widening gap between need and capacity, at the exact moment that gap should be closing.\n\nThis pressure shows up in real ways: harder fundraising conversations, stretched staff, and organizations forced to cut the outreach and relationship-building work that helps the public understand and trust their mission in the first place. Many grants exclude administrative costs, so the very capacity needed to communicate clearly and build community relationships is often the first thing to go.\n\nPhilanthropy, particularly flexible individual giving, can help break this cycle. Unrestricted donations let nonprofits invest in people and communication, not just programs. Just as important, a strong culture of giving signals to a community that people are willing to show up for each other even in hard economic times. When we support both the work and the people doing it, we create room for connection and durable, long-term impact\u2014not just a bridge over the gap, but a reason for people to believe the bridge will hold.", "leadership": "I joined my daughter's school Parent Teacher Organization at Shepardson Elementary and was elected president, staying on for an extra year to see a generational transition through. The PTO had long operated on \"this is how we've always done it\" tradition, but volunteering looks different post-COVID, especially for parents juggling work and family. If we wanted people to show up, we needed to meet them where they were rather than ask them to fit an old model.\n\nWorking alongside the rest of the PTO board, I helped identify clarity as one of our biggest barriers. Volunteer opportunities were scattered across different platforms with unclear time commitments, and giving meant navigating some combination of Venmo, PayPal, checks, cash, and Google Forms, on top of overwhelming email threads. Together, we consolidated everything into a single platform, with clear expectations and time commitments listed upfront for volunteering, and one simple way to give for fundraising. Lowering that friction made it easier for more people to say yes, in whatever small way worked for them, rather than relying on a few people to do a lot.\n\nThe timing mattered too: our prior leadership had moved on to the next school, so I worked with the incoming board to recruit and onboard an entirely new generation of PTO members, all while implementing these changes. Across three fundraising events and ongoing staff and school support activities, this collaborative approach helped grow participation, not by asking more of the same people, but by making it easier for more people to engage. That experience taught me that lasting community engagement isn't about working harder within an existing structure, it's about understanding why people aren't engaging and removing the barriers in their way, together with the people who care about the same mission", "collaboration": "One of my most successful collaborations was organizing a county-wide fundraising event that paired seven community leaders with seven dance instructors from across Weld County. The goal was for each duo to learn and perform a dance routine while promoting my organization through their networks. Beyond the ten participants, the event grew into a true community collaboration: local dance schools, businesses, and partners across the county got involved, each contributing their own networks and connections, which extended the event's reach far beyond what I could have built alone.\n\nMy role involved recruiting participants and partners, coordinating logistics, and helping each person understand how to leverage their own network, whether that meant suggesting specific ways to share the event, identifying who in their circle might be a natural connector, or simply giving people the confidence to ask. I also supported each team through challenges, whether it was stage fright, unfamiliarity with social media, or lack of time. Leading this group required patience, adaptability, and a strong sense of each person's strengths and comfort zones, while also trusting partners to bring their own communities into the effort. I learned how to navigate different personalities, offer support without overwhelming, and stay flexible when plans needed to change. The experience reinforced the power of collaboration: when people feel supported and seen, they're not only more willing to step outside their comfort zones, they're also willing to bring others along with them.", "hopeToGain": "As a NoCo Changemaker, I hope to gain a deeper understanding of how the broader philanthropic landscape in Northern Colorado fits together, individual donors, nonprofits, foundations, corporate giving, and government partners alike. I stepped into the Executive Director role at the Crawford Child Advocacy Center in March 2025, and I'm still building out my understanding of how these pieces connect across the region. I want to learn from others' experiences and involvement, what's worked, what hasn't, and how different elements of this puzzle support one another, so I can see where our work fits and where there's room to do more.\n\nAt the same time, I want this to be a two-way exchange. I bring a nonprofit leader's perspective, having seen firsthand how funding decisions, capacity constraints, and community trust play out on the ground, and I hope to offer that lens to my fellow Changemakers as much as I hope to learn from theirs. I believe lasting impact comes from strong, community-driven partnerships built on mutual learning, and I'm excited to grow both personally and professionally, as a new ED, through this program. By understanding how the pieces fit together and contributing what I've learned along the way, I hope to help align our collective efforts to create meaningful change across Northern Colorado.", "optionalDetail": "As the new Executive Director of the Crawford Child Advocacy Center, I bring several years of hands-on community engagement and fundraising leadership in Weld County, and I'm eager to extend that same depth of relationship-building into the broader Northern Colorado community. I see NoCo Changemakers as an opportunity to grow as a leader while contributing meaningfully alongside others who care about making a difference. I'm comfortable in collaborative, community-centered groups and bring a genuine willingness to listen, learn, and share as part of this next chapter, both for myself and for the organization I now lead.", "references": "Emily Stanfill: eraegra@gmail.com (503) 939-2530"}, {"name": "Tricia Vincent", "positionTitle": "Chief Development Officer", "employer": "Boys & Girls Clubs of Larimer County", "email": "tvincent@bgclarimer.org", "phone": "(303) 257-7968", "howHeard": "Referral from NoCo Foundation board or staff", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6583400950818658452/Tricia Vincent Resume 2026.pdf", "challenge": "I think one of the biggest challenges facing Northern Colorado is the increasingly high cost of living, which is making our community out of reach for the diverse residents and families who have made it such an amazing place to live. We are incredibly fortunate to have a robust nonprofit ecosystem that provides resources of all kinds to people and families. Philanthropy can play a vital role by funding these organizations, ensuring that everyone who lives here can get a hand up when they need it most.\n\nThe word philanthropy translates almost literally to mean \"love of humanity,\" and I think that is such a beautiful way to view it. When we love and care for one another, the entire community is better off.", "leadership": "A recent example of this was my involvement in the 2024\u201325 Leadership Fort Collins (LFC) cohort. For our group's impact project, I suggested and rallied our team around focusing on something \"un-glamorous\" but deeply impactful. I know how difficult it can be for organizations to get volunteer support for their actual, behind-the-scenes needs. Well-intentioned volunteers often show up expecting a certain experience, and nonprofit leaders often feel pressured to carefully curate those experiences. Along with my group, I wanted our project to create maximum impact for an organization without creating extra work for their staff.\n\nWe ultimately chose to support Homeward Alliance with a file digitization project. After transitioning to a digital intake process a few years ago, they were left with 50+ large tubs of physical paperwork that still needed to be stored. Our team dedicated dozens of hours to sorting, scanning, and saving these files. This ensured the organization retained access to its historical records while freeing up an entire closet of space. Through this project, we both learned and demonstrated that the most impactful leadership isn't showy or glamorous. It's a willingness to show up, roll up your sleeves, and do exactly what the community needs.", "collaboration": "This may be a nontraditional answer for this question, but it's hard for me to think of one specific example because collaboration is something I do every day in almost every facet of life. Sometimes my role in facilitating collaboration is to lead/organize it. This involves making sure everyone is heard, trying to consider all viewpoints, proposing solutions that meet the needs of multiple interests groups, and ensuring that everyone involved feels good about the direction things are headed. Other times effective collaboration means letting someone else take the lead, particularly if they have more knowledge about or responsibility for the task. This means having the humility to let others' needs and wants rise to the surface and stepping back to support their vision. \n\nWhether I am leading fundraising strategy alongside a board committee or supporting my team in their individual growth, collaboration is the baseline of my work. I believe that effective collaboration requires active listening and high emotional intelligence. You have to care just as much about the relationship and the process as you do about achieving the final goal.", "hopeToGain": "I'm celebrating a milestone birthday this year and with entering a new decade of life, I'm starting to think about how my husband and I can make a more strategic philanthropic impact in this community that we deeply love raising our family in. While I've worked in the NoCo nonprofit community for almost 20 years, both on the philanthropy and fundraising side, I've spent very little time thinking about my personal approach to giving back and how we can do it in a way that moves the needle in an area that is meaningful to us. I'm excited at the opportunity to connect with other like-minded individuals around engaging in philanthropy and utilize the information provided through this program to really get intentional about my personal giving. I also have been incredibly impressed with every NoCo Foundation program I've participated in, so I know the content will be valuable and enjoyable!", "optionalDetail": "I've been interested in participating in this program since it first launched and am so thrilled that the bandwidth and timing is aligning for me this year to apply.", "references": "Christina Cooper, 970-988-2176"}, {"name": "Tristan Barbattini", "positionTitle": "Trust Associate", "employer": "First Western Trust", "email": "tristan.barbattini@myfw.com", "phone": "(970) 229-4711", "howHeard": "Referral from Changemaker alumni", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6583002529342011280/Tristan.pdf", "challenge": "Homelessness in Northern Colorado has for the last few years become a thing. In the past, it was only in the \"big city\" of Denver that struggled with it and it has now come to our smaller towns here in Northern Colorado. I think philanthropy can play a very strong role in helping this very complex problem.", "leadership": "I live in Loveland in a neighborhood that is right next to a new construction subdivision. There is a ton of trash that blows into our subdivision from the building going on next to us. I walk my dog daily along the border of the 2 neighborhoods and have started picking up the trash. Because I feel that if it bothers me it must bother others. I have recently attended our HOA meetings to promote a trash pickup party.", "collaboration": "I collaborate a lot at work. We are currently going through audit preparation and we get demands from our higher ups. I, as trust associate, have to delegate who has to do what on our team to complete these tasks. So I am the director of the task and ultimately responsible in reporting our data. I compile, create spreadsheet and deliver this information in a timely manner. And I collaborate with my 2 Trust Officer's to confirm the data.", "hopeToGain": "I hope to meet and learn from community go-getters. I have not done a lot of volunteering recently and since I am now an empty nester, I have the time to focus on others outside of my home and work lives.", "optionalDetail": "", "references": "Marissa Riopelle at Marissa.Riopelle@myfw.com; Stephanie O'Hearn, Stephanie.O'Hearn@myfw.com"}, {"name": "Wade Keith", "positionTitle": "Director of Community Engagement", "employer": "Breeze Thru Car Wash", "email": "wade@breezethrucarwash.com", "phone": "(970) 441-5115", "howHeard": "Referral from NoCo Foundation board or staff", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6562472385414263911/Wade_Keith_Upgraded_Resume.docx", "challenge": "A big challenge in our communities is watershed health.  We are coming off the worst water year in recorded history and I feel that philanthropy could play a role in educating the public to decrease the amount of water that is wasted.  The challenge would be to break bad habits from people (like me) who move here from states that do not have water issues and waste water.  \n\nI see an opportunity for non-profits to get more creative with their fundraising.  Over the last two years, I am hearing reports that fundraising events are producing less results from years prior.  I'm a creative person and would love to assist as many non-profits with their fundraising efforts.", "leadership": "Emily S. is the junior Youth of the Year at Boys and Girls Club (BGCA) of Larimer County.  To achieve this honor, she had to write and deliver a speech to the staff at BGCA. I judged the initial presentation and we voted her in as a finalist.  After the judging, I volunteered my services to coach her on her presentation so can move to the next level.  Side note, I help people with speech preparation and delivery as a volunteer side gig.  We spent two afternoon sessions polishing her speech and she went on to compete and won.  She has now moved on to the state level competition.\n\nLast Saturday at the Boys and Girls Club Gala, she delivered the same speech and received a standing ovation.  She took my coaching seriously and made adjustments to her speech which paid off. This brought me to tears as I had a hand in her professional development. I see Emily being a community leader in the future and making positive change for our communities.", "collaboration": "We (Disabled Resource Services and Breeze Thru Car Wash) created a Bluesfest that happens in August at Odell Brewing that raises money for Disabled Resource Services (DRS).  We are going into it's third year.  This is a special day for me specifically as I volunteer my time and emcee the event.  I also booked all the bands for this year.  We raise money for a good cause and it brings a ton of exposure to DRS.\n\nThis year, Bluesfest was possibly not going to happen due to losing the grant for funding.  We (Breeze Thru Car Wash) decided to fund the event from our community budget to keep this effort going.  \n\nI learned from the experience that smaller non-profits need as much help as possible to gain brand awareness and funding.  Many non-profits don't have the operating budget to fill roles and I'm happy to offer my services to give them a boost.  My motto when it comes to participating in non-profit initiatives is, \"Service First, Exposure Second.\"", "hopeToGain": "I need to understand more on grants, grant writing, expanding teams for more community outreach, creating an effective volunteer program for our business, foundations, etc.\n\nMy role as of Jan. 1st became Director of Community Engagement.  Community Engagement has been part of my job for years.  Now that it is 100% of my job, I need to fill in the gaps of my understanding and this program will help me get there.  I understand it from the donor side.  I need to understand more of what happens from the non-profit side.", "optionalDetail": "I would like to thank you for putting together programs like this! I recently graduated from the Water Literate Leaders program and the education I received from that program was outstanding!  I had a goal to become literate with water issues and that program helped me achieve that goal.\n\nMy next initiative is to understand the non-profit/philanthropy piece to a high level and this program will help me achieve that goal.  I appreciate your consideration!", "references": "Jep Enck (970) 207-1550 jep@enckresources.com, Janice McAteer (970) 488-2034 Janice McAteer jmcateer@wynco.bbb.org"}, {"name": "Wyatt Warberg", "positionTitle": "Wealth Strategist", "employer": "Mountain Financial Capital", "email": "wyatt.warberg@mtnfincapital.com", "phone": "(970) 283-2021", "howHeard": "Referral from NoCo Foundation board or staff", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6567514306292952942/Wyatt Warberg NoCo Changemakers Resume.pdf", "challenge": "One that is prevalent for my generation is housing affordability in Northern Colorado. I have noticed a significant amount of my former high school classmates moving out of Fort Collins due to the unaffordability in the town. Either rent is too high or they are unable to outbid competitors on the housing market. Philanthropy can help educate the community on the issue and the factors that do play into the rising costs of housing in Northern Colorado. It can also help with the affordability. Charitable funds can be established to assist in rental stipends or down payment assistance programs.", "leadership": "Since graduating from High School, I have been involved in Young Life, a Christian Youth Ministry, as either a volunteer leader or on staff in Salt Lake City. When I was on staff as an administrator, it was part time during my final year of college. Young Life in Salt Lake City was going through a lot of changes on staff during this time as our local Area Director stepped down and I was then reporting to our Regional Director, who was busy overseeing all of Utah, Wyoming, and Idaho. I had to organize Young Life activities and manage both part-time staff members and volunteers. While I was only on staff for a year, I helped keep Young Life alive in Salt Lake City and overall, equipped young adults to be mentors for kids in the Salt Lake City community.", "collaboration": "My family and others have recently been tasked with forming our own family non-profit foundation, the Janet D Shea Educational Foundation. This foundation was my grandma\u2019s goal when she passed to start a fund that will provide full-ride scholarships to those pursuing secondary schooling. The foundation was not established until she passed, which left my family figuring out how to start a family foundation with minimal guidance from my grandma\u2019s wishes. While my family does work well together, we\u2019ve all had to navigate the challenges of upholding Janet\u2019s wishes with the foundation as well as discuss who is an ideal scholarship recipient outside of our own biases. We also had to collaborate extensively and delegate roles and tasks to start something none of us have had prior experience in.", "hopeToGain": "As a financial planner, I hope to better understand not only the challenges our communities in Northern Colorado face, but also how I can educate clients on best ways to face these challenges for themselves, their families and friends, or how they may be involved in the solution for others. Most times, clients aren\u2019t looking for the highest returns in their investment accounts, but affordability and budgeting for a new home, secondary school expenses for their kids, or how to find a job in an unstable job market. I hope that NoCo Changemakers will present me with the charitable options that can help my clients with these challenges.", "optionalDetail": "", "references": "Ed Moore, ed.moore@mtnfincapital.com,(720) 445-6901  Lisa Nelson, lisa@janetdsheafoundation.org,(970) 231-5131"}], "rubric": [{"criterion": "Community insight & philanthropic role", "weight": 0.15, "question": "How clearly does the applicant identify meaningful Northern Colorado challenges/opportunities and describe philanthropy as a useful part of the solution?", "scores": ["Vague issue or limited understanding of philanthropy.", "Identifies an issue but offers limited connection to philanthropy or local context.", "Clear issue and reasonable role for philanthropy.", "Strong local insight with thoughtful philanthropic role.", "Compelling systems-level insight; understands philanthropy as funding, convening, learning, and/or catalytic action."]}, {"criterion": "Personal philanthropy motivation", "weight": 0.2, "question": "Does the applicant show genuine interest in developing their own personal philanthropy, not primarily fundraising for their nonprofit, advancing employer/community relations, or networking for their job?", "scores": ["Primarily job-related fundraising, organizational benefit, or networking; little personal giving/learning intent.", "Some personal interest, but mostly framed around employer/nonprofit fundraising or professional networking.", "Balanced personal and professional motivations; may need probing.", "Clear personal philanthropic curiosity and desire to develop individual/family giving practice.", "Strong, explicit commitment to personal philanthropy, values-based giving, and long-term community contribution beyond job responsibilities."]}, {"criterion": "Leadership & initiative", "weight": 0.15, "question": "How strong is the applicant\u2019s demonstrated leadership or initiative in community, volunteer, civic, nonprofit, or professional settings?", "scores": ["Limited evidence of initiative or leadership.", "Some participation but limited ownership or outcomes.", "Solid example with identifiable role and positive contribution.", "Strong example with clear initiative, outcomes, and follow-through.", "Exceptional leadership; created, scaled, or sustained meaningful community impact."]}, {"criterion": "Collaboration & humility", "weight": 0.15, "question": "How well does the applicant demonstrate collaboration, listening, respect for partners, and learning from others?", "scores": ["Little evidence of collaboration or learning.", "Collaboration is described generally without clear role or reflection.", "Clear collaborative example and basic learning.", "Strong example with thoughtful role clarity and reflection.", "Exceptional cross-sector/team collaboration; shows humility, adaptability, and shared ownership."]}, {"criterion": "Learning orientation & cohort contribution", "weight": 0.15, "question": "Would the applicant actively learn from the cohort and contribute constructively to peer learning?", "scores": ["Limited curiosity or unclear contribution.", "Some curiosity but mostly transactional/one-way benefit.", "Likely to learn and participate.", "Strong curiosity and relevant lived/professional perspective.", "Highly reflective; likely to elevate the cohort through questions, experience, and generosity of perspective."]}, {"criterion": "Alignment with program purpose", "weight": 0.1, "question": "Overall, how well does the applicant align with NoCo Changemakers as a program for emerging/current leaders developing strategic, personal, community-centered philanthropy?", "scores": ["Poor program fit or unclear reasons for participating.", "Partial fit; primary goals may not match program purpose.", "Good fit with some questions to clarify.", "Strong fit and good timing.", "Excellent fit; participation would likely accelerate personal philanthropy and community impact."]}, {"criterion": "Overall recommendation", "weight": 0.1, "question": "Taking the written application as a whole, how strongly do you recommend the applicant for the 2026/27 cohort?", "scores": ["Do not recommend.", "Consider only if space remains.", "Recommend with reservations or follow-up needed.", "Recommend.", "Strongly recommend / priority candidate."]}]}

</script>

<script>
/* ============== Data ============== */
const DATA = JSON.parse(document.getElementById('data-json').textContent);
const APPLICANTS = DATA.applicants;
const RUBRIC = DATA.rubric;
const RUBRIC_KEYS = ['communityInsight','personalPhilanthropy','leadership','collaborationScore','learningOrientation','programAlignment','overallRecommendation'];
const REC_OPTIONS = ['Admit','Waitlist','Discuss','Do not admit'];

const FIELD_DEFS = [
  {key:'challenge', label:'Challenge / opportunity', icon:'◆', question:'What challenge or opportunity in Northern Colorado does the applicant identify, and what role do they see for philanthropy?'},
  {key:'leadership', label:'Leadership / initiative', icon:'◆', question:'Demonstrated leadership or initiative.'},
  {key:'collaboration', label:'Collaboration', icon:'◆', question:'Demonstrated collaboration, listening, and humility.'},
  {key:'hopeToGain', label:'Hope to gain', icon:'◆', question:'What the applicant hopes to gain from the cohort.'},
  {key:'optionalDetail', label:'Optional detail', icon:'◇', question:''},
  {key:'references', label:'References', icon:'◇', question:''},
];

/* ============== State ============== */
const STORAGE_PREFIX = 'noco2627';
let currentIndex = -1; // -1 = welcome screen, APPLICANTS.length = summary screen
let evaluatorInfo = {name:'', email:''};
let responses = {}; // applicantName -> {scores:{}, comments, followup, finalRec}
let collapsedOptional = {}; // applicantName -> bool (collapsed by default for long optional/refs)

/* ============== Storage helpers ==============
   Uses window.storage when available (Claude.ai artifact runtime).
   Falls back to localStorage when this file is opened directly as a
   downloaded HTML file (the expected normal use case), so reviewers
   still get autosave/resume in their own browser. */
const HAS_ARTIFACT_STORAGE = (typeof window !== 'undefined' && !!window.storage);

async function storageGet(key){
  if(HAS_ARTIFACT_STORAGE){
    try{ return await window.storage.get(key, false); }catch(e){ return null; }
  }
  try{
    const raw = localStorage.getItem(key);
    return raw === null ? null : {value: raw};
  }catch(e){ return null; }
}
async function storageSet(key, value){
  if(HAS_ARTIFACT_STORAGE){
    try{ return await window.storage.set(key, value, false); }catch(e){ return null; }
  }
  try{ localStorage.setItem(key, value); return {value}; }catch(e){ return null; }
}
async function storageDelete(key){
  if(HAS_ARTIFACT_STORAGE){
    try{ return await window.storage.delete(key, false); }catch(e){ return null; }
  }
  try{ localStorage.removeItem(key); return true; }catch(e){ return null; }
}

async function loadAll(){
  const ev = await storageGet(`${STORAGE_PREFIX}:evaluator`);
  if(ev) try{ evaluatorInfo = JSON.parse(ev.value); }catch(e){}
  for(const a of APPLICANTS){
    const r = await storageGet(`${STORAGE_PREFIX}:resp:${a.name}`);
    if(r) try{ responses[a.name] = JSON.parse(r.value); }catch(e){}
  }
}

let saveTimer = null;
function scheduleSave(name){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>persist(name), 350);
}

async function persist(name){
  await storageSet(`${STORAGE_PREFIX}:evaluator`, JSON.stringify(evaluatorInfo));
  if(name){
    await storageSet(`${STORAGE_PREFIX}:resp:${name}`, JSON.stringify(responses[name] || {}));
  }
  showSavedPill();
}

function showSavedPill(){
  const el = document.getElementById('save-pill-text');
  if(el){
    el.textContent = 'Saved';
    setTimeout(()=>{ if(el) el.textContent = 'Saved automatically'; }, 1400);
  }
}

function getResp(name){
  if(!responses[name]) responses[name] = {scores:{}, comments:'', followup:'', finalRec:''};
  if(!responses[name].scores) responses[name].scores = {};
  return responses[name];
}

function isReviewed(name){
  const r = responses[name];
  if(!r) return 0; // 0 = not started
  const scored = RUBRIC_KEYS.filter(k => r.scores && r.scores[k]).length;
  if(scored === 0 && !r.finalRec) return 0;
  if(scored === RUBRIC_KEYS.length && r.finalRec) return 2; // complete
  return 1; // partial
}

/* ============== Render: Sidebar ============== */
function renderSidebar(){
  document.getElementById('ev-name').value = evaluatorInfo.name || '';
  document.getElementById('ev-email').value = evaluatorInfo.email || '';

  const list = document.getElementById('sb-list');
  list.innerHTML = '';
  let completeCount = 0;
  APPLICANTS.forEach((a, i)=>{
    const state = isReviewed(a.name);
    if(state === 2) completeCount++;
    const btn = document.createElement('button');
    btn.className = 'sb-item' + (i === currentIndex ? ' active' : '');
    btn.innerHTML = `
      <span class="sb-dot ${state===2?'done':state===1?'partial':''}"></span>
      <span class="sb-item-text">
        <span class="sb-item-name">${i+1}. ${escapeHtml(a.name)}</span>
        <span class="sb-item-role">${escapeHtml(a.employer)}</span>
      </span>`;
    btn.onclick = ()=> goTo(i);
    list.appendChild(btn);
  });

  document.getElementById('progress-count').textContent = completeCount;
  document.getElementById('progress-fill').style.width = (completeCount/APPLICANTS.length*100) + '%';
}

/* ============== Render: Welcome screen ============== */
function renderWelcome(){
  document.getElementById('mb-title').textContent = 'Welcome';
  const el = document.getElementById('main-inner');
  el.innerHTML = `
    <div class="hero-card">
      <p class="hero-eyebrow">Reviewer guide</p>
      <h2 class="hero-title">Welcome, evaluator.</h2>
      <p class="hero-text">You're reviewing <b>${APPLICANTS.length} applicants</b> for the 2026/27 NoCo Changemakers cohort. Each applicant page shows their full application alongside the recommended rubric — read first, then score.</p>
      <p class="hero-text">Scores should reflect evidence in the application, not personal familiarity with the applicant. Your responses save automatically in this browser as you go, so you can leave and come back.</p>
      <ul class="hero-list">
        <li><span class="hi-num">01</span><span>Enter your name and email in the sidebar so your export is identifiable.</span></li>
        <li><span class="hi-num">02</span><span>Work through each applicant: read the packet, score all <b>7 rubric criteria</b> (1–5), add optional notes, and choose a final recommendation.</span></li>
        <li><span class="hi-num">03</span><span>When you're finished, use <b>Export scores (CSV)</b> in the sidebar to download your results for the selection committee.</span></li>
      </ul>
      <button class="hero-cta" onclick="goTo(0)">Start reviewing →</button>
    </div>
  `;
}

/* ============== Render: Applicant page ============== */
function fieldBlockHtml(a, def){
  const val = (a[def.key] || '').trim();
  if(!val){
    return `<div class="pfield"><p class="pfield-label"><span class="ic">${def.icon}</span>${def.label}</p><p class="pfield-empty">Not provided.</p></div>`;
  }
  return `<div class="pfield">
    <p class="pfield-label"><span class="ic">${def.icon}</span>${def.label}</p>
    <p class="pfield-text">${escapeHtml(val)}</p>
  </div>`;
}

function renderApplicant(i){
  const a = APPLICANTS[i];
  const r = getResp(a.name);
  document.getElementById('mb-title').textContent = a.name;

  const mainFields = FIELD_DEFS.filter(f=>['challenge','leadership','collaboration','hopeToGain'].includes(f.key))
    .map(f=>fieldBlockHtml(a,f)).join('');
  const extraFields = FIELD_DEFS.filter(f=>['optionalDetail','references'].includes(f.key))
    .map(f=>fieldBlockHtml(a,f)).join('');

  const rubricHtml = RUBRIC.map((crit, ci)=>{
    const key = RUBRIC_KEYS[ci];
    const current = r.scores[key] || '';
    const pct = Math.round(crit.weight*100);
    const scaleHtml = [1,2,3,4,5].map(n=>{
      const desc = crit.scores[n-1];
      const id = `score-${i}-${ci}-${n}`;
      return `<div class="scale-opt">
        <input type="radio" name="score-${i}-${ci}" id="${id}" value="${n}" ${String(current)===String(n)?'checked':''} onchange="setScore('${escapeAttr(a.name)}','${key}',${n})">
        <label for="${id}">
          <span class="num">${n}</span>
          <span class="desc">${escapeHtml(truncate(desc, 58))}</span>
        </label>
      </div>`;
    }).join('');
    return `<div class="rubric-item">
      <div class="rubric-item-top">
        <p class="rubric-name">${ci+1}. ${escapeHtml(crit.criterion)}</p>
        <div class="rubric-weight-wrap">
          <div class="rubric-weight-bar"><div class="rubric-weight-fill" style="width:${pct*2}%"></div></div>
          <span class="rubric-weight-pct">${pct}% wt.</span>
        </div>
      </div>
      <p class="rubric-question">${escapeHtml(crit.question)}</p>
      <div class="scale-row">${scaleHtml}</div>
    </div>`;
  }).join('');

  const recHtml = REC_OPTIONS.map(opt=>{
    const id = `rec-${i}-${opt.replace(/\s+/g,'')}`;
    return `<div class="rec-opt" data-val="${opt}">
      <input type="radio" name="rec-${i}" id="${id}" value="${opt}" ${r.finalRec===opt?'checked':''} onchange="setFinalRec('${escapeAttr(a.name)}','${opt}')">
      <label for="${id}">${opt}</label>
    </div>`;
  }).join('');

  const el = document.getElementById('main-inner');
  el.innerHTML = `
    <div class="packet-card">
      <div class="packet-head">
        <div>
          <h2 class="packet-name">${escapeHtml(a.name)}</h2>
          <p class="packet-role"><b>${escapeHtml(a.positionTitle)}</b> · ${escapeHtml(a.employer)}</p>
          <span class="packet-tag">How heard: ${escapeHtml(truncate(a.howHeard, 70))}</span>
        </div>
        <div class="packet-meta">
          <div class="packet-num">Applicant ${i+1} of ${APPLICANTS.length}</div><br>
          ${a.email ? `${escapeHtml(a.email)}<br>` : ''}
          ${a.phone ? `${escapeHtml(a.phone)}<br>` : ''}
          ${a.resumeLink ? `<a href="${escapeAttr(a.resumeLink)}" target="_blank" rel="noopener">View résumé ↗</a>` : ''}
        </div>
      </div>
      <div class="packet-body">
        ${mainFields}
        <div class="pfield" style="border-bottom:none; padding-bottom:0;">
          <button class="collapsible-toggle" onclick="toggleOptional('${escapeAttr(a.name)}')" id="opt-toggle-${i}">
            ${collapsedOptional[a.name]===false ? '▾ Hide optional detail & references' : '▸ Show optional detail & references'}
          </button>
          <div id="opt-fields-${i}" style="display:${collapsedOptional[a.name]===false ? 'block':'none'}; margin-top:4px;">
            ${extraFields}
          </div>
        </div>
      </div>
    </div>

    <div class="section-divider"><span class="sd-label">Rubric</span><span class="sd-line"></span></div>
    <p class="section-hint">Score each criterion 1–5 using the evidence above. Weight shown reflects each criterion's share of the overall recommendation.</p>
    <div class="rubric-card">${rubricHtml}</div>

    <div class="section-divider"><span class="sd-label">Notes &amp; recommendation</span><span class="sd-line"></span></div>
    <div class="rubric-card" style="padding:22px 26px;">
      <div class="field-block">
        <label class="field-label" for="comments-${i}">Evidence or notes supporting your scores <span class="field-optional">(optional)</span></label>
        <textarea id="comments-${i}" placeholder="Cite specific evidence from the application…" oninput="setText('${escapeAttr(a.name)}','comments', this.value)">${escapeHtml(r.comments||'')}</textarea>
      </div>
      <div class="field-block">
        <label class="field-label" for="followup-${i}">Follow-up questions or concerns <span class="field-optional">(optional)</span></label>
        <textarea id="followup-${i}" placeholder="Anything to raise with the committee or ask the applicant directly…" oninput="setText('${escapeAttr(a.name)}','followup', this.value)">${escapeHtml(r.followup||'')}</textarea>
      </div>
      <div class="field-block" style="margin-bottom:0;">
        <label class="field-label">Final recommendation</label>
        <div class="rec-row">${recHtml}</div>
      </div>
    </div>

    <div class="nav-bar">
      <button class="nav-btn" id="prev-btn" onclick="goTo(${i-1})" ${i===0?'disabled':''}>← Previous</button>
      <span class="save-pill"><span class="dot"></span><span id="save-pill-text">Saved automatically</span></span>
      <button class="nav-btn primary" id="next-btn" onclick="goTo(${i+1})">${i===APPLICANTS.length-1 ? 'Finish review →' : 'Next applicant →'}</button>
    </div>
  `;
}

function toggleOptional(name){
  collapsedOptional[name] = collapsedOptional[name]===false ? true : false;
  renderApplicant(currentIndex);
}

/* ============== Render: Summary screen ============== */
function recPillClass(rec){
  if(rec==='Admit') return 'admit';
  if(rec==='Waitlist') return 'waitlist';
  if(rec==='Discuss') return 'discuss';
  if(rec==='Do not admit') return 'notadmit';
  return 'pending';
}

function computeWeighted(r){
  let sum = 0, wsum = 0;
  RUBRIC.forEach((crit, ci)=>{
    const key = RUBRIC_KEYS[ci];
    const v = r.scores ? Number(r.scores[key]) : 0;
    if(v){ sum += v*crit.weight; wsum += crit.weight; }
  });
  if(wsum === 0) return null;
  return (sum/wsum).toFixed(2);
}

function renderSummary(){
  document.getElementById('mb-title').textContent = 'Summary';
  const completeCount = APPLICANTS.filter(a=>isReviewed(a.name)===2).length;
  const rows = APPLICANTS.map((a,i)=>{
    const r = getResp(a.name);
    const w = computeWeighted(r);
    return `<tr>
      <td class="name">${escapeHtml(a.name)}</td>
      <td title="${escapeAttr(a.employer)}">${escapeHtml(a.employer)}</td>
      <td>${w ?? '—'}</td>
      <td><span class="pill-rec ${recPillClass(r.finalRec)}">${r.finalRec || 'Pending'}</span></td>
      <td><button class="nav-btn" style="padding:5px 10px; font-size:12px;" onclick="goTo(${i})">Open →</button></td>
    </tr>`;
  }).join('');

  const el = document.getElementById('main-inner');
  el.innerHTML = `
    <div class="hero-card">
      <p class="hero-eyebrow">Review complete</p>
      <h2 class="hero-title">Nice work.</h2>
      <p class="hero-text">You've completed <b>${completeCount} of ${APPLICANTS.length}</b> applicant evaluations. Review the summary below, jump back into any applicant to make changes, or export your scores for the selection committee.</p>
      <button class="hero-cta" onclick="exportCSV()">⬇ Export scores (CSV)</button>
    </div>
    <div class="section-divider"><span class="sd-label">All applicants</span><span class="sd-line"></span></div>
    <div class="rubric-card" style="padding:8px 10px;">
      <div class="summary-table-wrap">
        <table class="summary">
          <thead><tr><th>Applicant</th><th>Organization</th><th>Weighted score</th><th>Final rec.</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
    <div class="nav-bar" style="justify-content:flex-start;">
      <button class="nav-btn" onclick="goTo(${APPLICANTS.length-1})">← Back to last applicant</button>
    </div>
  `;
}

/* ============== Navigation ============== */
function goTo(i){
  if(i < -1) i = -1;
  if(i > APPLICANTS.length) i = APPLICANTS.length;
  currentIndex = i;
  if(i === -1) renderWelcome();
  else if(i === APPLICANTS.length) renderSummary();
  else renderApplicant(i);
  renderSidebar();
  document.getElementById('main').scrollTo(0,0);
  closeSidebar();
}

/* ============== Field setters ============== */
function setScore(name, key, val){
  const r = getResp(name);
  r.scores[key] = val;
  scheduleSave(name);
  renderSidebar();
}
function setText(name, field, val){
  const r = getResp(name);
  r[field] = val;
  scheduleSave(name);
}
function setFinalRec(name, val){
  const r = getResp(name);
  r.finalRec = val;
  scheduleSave(name);
  renderSidebar();
}

document.getElementById('ev-name').addEventListener('input', e=>{
  evaluatorInfo.name = e.target.value;
  scheduleSave(null);
});
document.getElementById('ev-email').addEventListener('input', e=>{
  evaluatorInfo.email = e.target.value;
  scheduleSave(null);
});

/* ============== Export ============== */
function csvEscape(v){
  if(v === undefined || v === null) v = '';
  v = String(v).replace(/"/g,'""');
  return `"${v}"`;
}

function exportCSV(){
  const headers = ['Evaluator','Evaluator Email','Applicant','Organization',
    ...RUBRIC.map(c=>c.criterion),
    'Weighted Score','Final Recommendation','Evidence / Notes','Follow-up'];
  const rows = [headers];
  APPLICANTS.forEach(a=>{
    const r = getResp(a.name);
    const w = computeWeighted(r);
    rows.push([
      evaluatorInfo.name||'', evaluatorInfo.email||'', a.name, a.employer,
      ...RUBRIC_KEYS.map(k=>r.scores[k]||''),
      w ?? '', r.finalRec||'', r.comments||'', r.followup||''
    ]);
  });
  const csv = rows.map(row=>row.map(csvEscape).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  const safeName = (evaluatorInfo.name||'evaluator').replace(/[^a-z0-9]+/gi,'_');
  link.href = url;
  link.download = `NoCo_Changemakers_2026-27_Evaluations_${safeName}.csv`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
  showToast('CSV exported. Send this file to the selection committee.');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3200);
}

/* ============== Reset ============== */
async function confirmReset(){
  if(!confirm('Clear all of your saved scores and notes for every applicant? This cannot be undone.')) return;
  for(const a of APPLICANTS){
    responses[a.name] = {scores:{}, comments:'', followup:'', finalRec:''};
    await storageDelete(`${STORAGE_PREFIX}:resp:${a.name}`);
  }
  showToast('All responses cleared.');
  goTo(-1);
}

/* ============== Mobile sidebar ============== */
function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('scrim').classList.add('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('scrim').classList.remove('show');
}

/* ============== Utils ============== */
function escapeHtml(s){
  if(s===undefined||s===null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(s){
  return escapeHtml(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function truncate(s, n){
  if(!s) return '';
  return s.length > n ? s.slice(0,n-1)+'…' : s;
}

/* ============== Init ============== */
(async function init(){
  await loadAll();
  goTo(-1);
})();

</script>
