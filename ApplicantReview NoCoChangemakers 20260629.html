<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoCo Changemakers 2026/27 — Applicant Evaluation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF8F3;
    --paper-raised:#FFFFFF;
    --ink:#23271F;
    --ink-soft:#5B5E54;
    --ink-faint:#8B8E83;
    --sage:#3D6B4F;
    --sage-deep:#2A4D38;
    --sage-pale:#E7EFE6;
    --clay:#A0613F;
    --clay-pale:#F2E4D8;
    --line:#DCD5C5;
    --line-soft:#EAE5D8;
    --amber:#B8852F;
    --amber-pale:#FBF1DE;
    --danger:#A0392F;
    --danger-pale:#F7E8E5;
    --shadow:0 1px 2px rgba(35,39,31,0.04), 0 4px 16px rgba(35,39,31,0.06);
    --shadow-lg:0 8px 30px rgba(35,39,31,0.12);
    --radius:10px;
    --serif:'Lora', Georgia, serif;
    --sans:'Inter', -apple-system, system-ui, sans-serif;
    --mono:'JetBrains Mono', monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    font-size:15px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--sage-pale);}

  a{color:var(--sage-deep);}

  button{font-family:inherit;cursor:pointer;}
  button:focus-visible, input:focus-visible, textarea:focus-visible, [tabindex]:focus-visible{
    outline:2.5px solid var(--sage);
    outline-offset:2px;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }

  /* ===== App shell ===== */
  #app{display:flex; min-height:100vh;}

  /* ===== Sidebar ===== */
  #sidebar{
    width:300px;
    flex:none;
    background:var(--paper-raised);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    height:100vh;
    position:sticky;
    top:0;
  }
  .sb-header{
    padding:22px 20px 16px;
    border-bottom:1px solid var(--line-soft);
  }
  .sb-eyebrow{
    font-size:11px;
    letter-spacing:0.09em;
    text-transform:uppercase;
    color:var(--sage-deep);
    font-weight:600;
    margin:0 0 6px;
  }
  .sb-title{
    font-family:var(--serif);
    font-size:19px;
    font-weight:600;
    margin:0;
    line-height:1.25;
    color:var(--ink);
  }
  .sb-sub{
    font-size:12.5px;
    color:var(--ink-faint);
    margin:6px 0 0;
  }

  .sb-evaluator{
    padding:14px 20px;
    border-bottom:1px solid var(--line-soft);
    background:var(--sage-pale);
  }
  .sb-evaluator label{
    display:block;
    font-size:11px;
    font-weight:600;
    color:var(--sage-deep);
    text-transform:uppercase;
    letter-spacing:0.06em;
    margin-bottom:3px;
  }
  .sb-evaluator input{
    width:100%;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--paper-raised);
    padding:6px 9px;
    font-size:13.5px;
    font-family:inherit;
    margin-bottom:7px;
    color:var(--ink);
  }
  .sb-evaluator input:last-of-type{margin-bottom:0;}

  .sb-progress-wrap{
    padding:14px 20px 10px;
    border-bottom:1px solid var(--line-soft);
  }
  .sb-progress-label{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  .sb-progress-count{font-weight:700; color:var(--sage-deep); font-family:var(--mono);}
  .sb-progress-track{
    height:6px;
    border-radius:4px;
    background:var(--line-soft);
    overflow:hidden;
  }
  .sb-progress-fill{
    height:100%;
    background:var(--sage);
    border-radius:4px;
    transition:width .35s ease;
  }

  .sb-list{
    flex:1;
    overflow-y:auto;
    padding:8px 10px 14px;
  }
  .sb-item{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;
    text-align:left;
    background:none;
    border:none;
    border-radius:8px;
    padding:9px 10px;
    margin-bottom:1px;
    font-size:13.5px;
    color:var(--ink);
    transition:background .12s ease;
  }
  .sb-item:hover{background:var(--line-soft);}
  .sb-item.active{background:var(--sage-pale);}
  .sb-item.active .sb-item-name{color:var(--sage-deep); font-weight:700;}

  .sb-dot{
    flex:none;
    width:9px; height:9px;
    border-radius:50%;
    border:1.5px solid var(--line);
    background:var(--paper-raised);
  }
  .sb-dot.done{background:var(--sage); border-color:var(--sage);}
  .sb-dot.partial{background:var(--amber); border-color:var(--amber);}

  .sb-item-text{flex:1; min-width:0;}
  .sb-item-name{
    display:block;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .sb-item-role{
    display:block;
    font-size:11.5px;
    color:var(--ink-faint);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .sb-footer{
    padding:12px 20px 18px;
    border-top:1px solid var(--line-soft);
  }
  .sb-export-btn{
    width:100%;
    background:var(--sage-deep);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:10px 12px;
    font-size:13.5px;
    font-weight:600;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:7px;
  }
  .sb-export-btn:hover{background:var(--sage);}
  .sb-reset-link{
    display:block;
    text-align:center;
    margin-top:9px;
    font-size:11.5px;
    color:var(--ink-faint);
    background:none;
    border:none;
    text-decoration:underline;
  }

  /* ===== Main ===== */
  #main{flex:1; min-width:0; height:100vh; overflow-y:auto; scroll-behavior:smooth;}
  .main-inner{
    max-width:880px;
    margin:0 auto;
    padding:36px 40px 90px;
  }

  /* mobile top bar */
  #mobile-bar{
    display:none;
    position:sticky; top:0; z-index:20;
    background:var(--paper-raised);
    border-bottom:1px solid var(--line);
    padding:12px 16px;
    align-items:center;
    justify-content:space-between;
  }
  #mobile-bar .mb-title{font-family:var(--serif); font-weight:600; font-size:15px;}
  #mobile-bar button{
    background:var(--sage-pale); border:1px solid var(--line);
    border-radius:7px; padding:7px 10px; font-size:13px; color:var(--sage-deep); font-weight:600;
  }

  /* ===== Applicant header card ===== */
  .packet-card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    margin-bottom:22px;
    overflow:hidden;
  }
  .packet-head{
    padding:24px 26px 20px;
    border-bottom:1px solid var(--line-soft);
    display:flex;
    justify-content:space-between;
    gap:18px;
    flex-wrap:wrap;
  }
  .packet-name{
    font-family:var(--serif);
    font-size:27px;
    font-weight:700;
    margin:0 0 4px;
    color:var(--ink);
  }
  .packet-role{
    font-size:14.5px;
    color:var(--ink-soft);
    margin:0;
  }
  .packet-role b{color:var(--ink);}
  .packet-meta{
    font-size:12.5px;
    color:var(--ink-faint);
    text-align:right;
    line-height:1.7;
  }
  .packet-meta a{color:var(--sage-deep); text-decoration:none; font-weight:600;}
  .packet-meta a:hover{text-decoration:underline;}
  .packet-num{
    font-family:var(--mono);
    font-size:11.5px;
    color:var(--sage-deep);
    background:var(--sage-pale);
    border-radius:5px;
    padding:2px 7px;
    font-weight:600;
    letter-spacing:0.02em;
  }

  .packet-tag{
    display:inline-block;
    font-size:11px;
    color:var(--clay);
    background:var(--clay-pale);
    border-radius:5px;
    padding:3px 8px;
    margin-top:8px;
    font-weight:600;
  }

  .packet-body{padding:6px 26px 22px;}
  .pfield{padding:16px 0; border-bottom:1px solid var(--line-soft);}
  .pfield:last-child{border-bottom:none;}
  .pfield-label{
    font-size:11.5px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.07em;
    color:var(--sage-deep);
    margin:0 0 7px;
    display:flex;
    align-items:center;
    gap:7px;
  }
  .pfield-label .ic{font-size:13px;}
  .pfield-text{
    margin:0;
    color:var(--ink);
    white-space:pre-wrap;
    font-size:14.5px;
    line-height:1.65;
  }
  .pfield-empty{color:var(--ink-faint); font-style:italic; font-size:13.5px;}

  .collapsible-toggle{
    background:none; border:none; color:var(--ink-faint); font-size:12px;
    display:flex; align-items:center; gap:5px; margin-top:4px; padding:2px 0;
  }
  .collapsible-toggle:hover{color:var(--sage-deep);}

  /* ===== Section divider ===== */
  .section-divider{
    display:flex;
    align-items:center;
    gap:14px;
    margin:38px 0 18px;
  }
  .section-divider .sd-label{
    font-family:var(--serif);
    font-size:20px;
    font-weight:600;
    color:var(--ink);
    white-space:nowrap;
  }
  .section-divider .sd-line{flex:1; height:1px; background:var(--line);}
  .section-hint{
    font-size:13px;
    color:var(--ink-faint);
    margin:-10px 0 20px;
  }

  /* ===== Rubric ===== */
  .rubric-card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    margin-bottom:16px;
    overflow:hidden;
  }
  .rubric-item{padding:20px 26px; border-bottom:1px solid var(--line-soft);}
  .rubric-item:last-child{border-bottom:none;}
  .rubric-item-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
    margin-bottom:6px;
  }
  .rubric-name{
    font-size:15.5px;
    font-weight:700;
    color:var(--ink);
    margin:0;
  }
  .rubric-weight-wrap{
    flex:none;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .rubric-weight-bar{
    width:46px;
    height:6px;
    border-radius:3px;
    background:var(--line-soft);
    overflow:hidden;
  }
  .rubric-weight-fill{height:100%; background:var(--clay); border-radius:3px;}
  .rubric-weight-pct{
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-faint);
    white-space:nowrap;
  }
  .rubric-question{
    font-size:13.5px;
    color:var(--ink-soft);
    margin:0 0 14px;
    line-height:1.55;
  }

  .scale-row{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:8px;
  }
  .scale-opt{
    position:relative;
  }
  .scale-opt input{
    position:absolute;
    opacity:0;
    width:100%; height:100%;
    margin:0;
    cursor:pointer;
  }
  .scale-opt label{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:5px;
    border:1.5px solid var(--line);
    border-radius:8px;
    padding:9px 6px 10px;
    cursor:pointer;
    background:var(--paper);
    transition:border-color .12s ease, background .12s ease;
    height:100%;
  }
  .scale-opt .num{
    font-family:var(--serif);
    font-weight:700;
    font-size:17px;
    color:var(--ink-soft);
  }
  .scale-opt .desc{
    font-size:10.8px;
    line-height:1.35;
    color:var(--ink-faint);
    text-align:center;
  }
  .scale-opt label:hover{border-color:var(--sage);}
  .scale-opt input:checked + label{
    border-color:var(--sage);
    background:var(--sage-pale);
  }
  .scale-opt input:checked + label .num{color:var(--sage-deep);}
  .scale-opt input:checked + label .desc{color:var(--sage-deep);}

  /* ===== Comments & final rec ===== */
  .field-block{margin-bottom:18px;}
  .field-block label.field-label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:var(--ink);
    margin-bottom:7px;
  }
  .field-block .field-optional{
    color:var(--ink-faint);
    font-weight:400;
    font-size:12px;
  }
  textarea{
    width:100%;
    border:1.5px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
    font-family:inherit;
    font-size:14px;
    color:var(--ink);
    background:var(--paper);
    resize:vertical;
    min-height:78px;
  }
  textarea:focus{border-color:var(--sage);}

  .rec-row{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:9px;
  }
  .rec-opt input{position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; margin:0;}
  .rec-opt{position:relative;}
  .rec-opt label{
    display:flex; align-items:center; justify-content:center;
    border:1.5px solid var(--line);
    border-radius:8px;
    padding:11px 8px;
    font-size:13px;
    font-weight:600;
    text-align:center;
    cursor:pointer;
    background:var(--paper);
    color:var(--ink-soft);
  }
  .rec-opt label:hover{border-color:var(--sage);}
  .rec-opt input:checked + label{border-color:var(--sage-deep); background:var(--sage-deep); color:#fff;}
  .rec-opt[data-val="Do not admit"] input:checked + label{border-color:var(--danger); background:var(--danger);}
  .rec-opt[data-val="Discuss"] input:checked + label{border-color:var(--amber); background:var(--amber);}
  .rec-opt[data-val="Waitlist"] input:checked + label{border-color:#7A6A3F; background:#7A6A3F;}

  /* ===== Footer nav ===== */
  .nav-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:30px;
    padding-top:20px;
    border-top:1px solid var(--line);
  }
  .nav-btn{
    display:flex; align-items:center; gap:8px;
    background:var(--paper-raised);
    border:1.5px solid var(--line);
    border-radius:8px;
    padding:10px 16px;
    font-size:13.5px;
    font-weight:600;
    color:var(--ink);
  }
  .nav-btn:hover{border-color:var(--sage); color:var(--sage-deep);}
  .nav-btn:disabled{opacity:0.35; cursor:default;}
  .nav-btn:disabled:hover{border-color:var(--line); color:var(--ink);}
  .nav-btn.primary{background:var(--sage-deep); border-color:var(--sage-deep); color:#fff;}
  .nav-btn.primary:hover{background:var(--sage);}

  .save-pill{
    font-size:12px;
    color:var(--ink-faint);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .save-pill .dot{width:6px; height:6px; border-radius:50%; background:var(--sage); display:inline-block;}

  /* ===== Welcome / summary screens ===== */
  .hero-card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:38px 40px;
  }
  .hero-eyebrow{
    font-size:12px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--sage-deep); font-weight:700; margin:0 0 10px;
  }
  .hero-title{
    font-family:var(--serif);
    font-size:32px;
    font-weight:700;
    margin:0 0 14px;
    line-height:1.2;
  }
  .hero-text{font-size:15px; color:var(--ink-soft); max-width:600px; margin:0 0 10px;}
  .hero-list{margin:18px 0 0; padding-left:0; list-style:none;}
  .hero-list li{
    display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--line-soft);
    font-size:13.5px; color:var(--ink-soft);
  }
  .hero-list li b{color:var(--ink); font-weight:600;}
  .hero-list .hi-num{font-family:var(--mono); color:var(--clay); font-weight:700; flex:none; width:20px;}
  .hero-cta{
    margin-top:24px;
    background:var(--sage-deep);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:13px 22px;
    font-size:14.5px;
    font-weight:700;
  }
  .hero-cta:hover{background:var(--sage);}

  .summary-table-wrap{overflow-x:auto;}
  table.summary{
    width:100%;
    border-collapse:collapse;
    font-size:12.5px;
    margin-top:10px;
    table-layout:fixed;
  }
  table.summary th{
    text-align:left;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--ink-faint);
    border-bottom:1.5px solid var(--line);
    padding:8px 10px;
  }
  table.summary td{
    padding:9px 10px;
    border-bottom:1px solid var(--line-soft);
    color:var(--ink-soft);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  table.summary th:nth-child(1), table.summary td:nth-child(1){width:19%;}
  table.summary th:nth-child(2), table.summary td:nth-child(2){width:33%;}
  table.summary th:nth-child(3), table.summary td:nth-child(3){width:14%; white-space:normal;}
  table.summary th:nth-child(4), table.summary td:nth-child(4){width:17%; white-space:normal;}
  table.summary th:nth-child(5), table.summary td:nth-child(5){width:17%; text-align:right; white-space:normal;}
  table.summary td.name{color:var(--ink); font-weight:600;}
  table.summary tr:hover td{background:var(--line-soft);}
  .pill-rec{
    display:inline-block; padding:2px 8px; border-radius:5px; font-size:11px; font-weight:700;
  }
  .pill-rec.admit{background:var(--sage-pale); color:var(--sage-deep);}
  .pill-rec.waitlist{background:#F1ECDD; color:#7A6A3F;}
  .pill-rec.discuss{background:var(--amber-pale); color:var(--amber);}
  .pill-rec.notadmit{background:var(--danger-pale); color:var(--danger);}
  .pill-rec.pending{background:var(--line-soft); color:var(--ink-faint);}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:11px 20px; border-radius:8px;
    font-size:13px; font-weight:600; box-shadow:var(--shadow-lg);
    opacity:0; transition:opacity .25s ease, transform .25s ease;
    pointer-events:none; z-index:100;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .scroll-top-spacer{height:1px;}

  /* ===== Mobile ===== */
  @media (max-width:880px){
    #sidebar{
      position:fixed; left:0; top:0; height:100vh; z-index:30;
      transform:translateX(-100%);
      transition:transform .25s ease;
      width:88%;
      max-width:320px;
      box-shadow:var(--shadow-lg);
    }
    #sidebar.open{transform:translateX(0);}
    #scrim{
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:25;
    }
    #scrim.show{display:block;}
    #mobile-bar{display:flex;}
    .main-inner{padding:20px 16px 70px;}
    .packet-head{flex-direction:column;}
    .packet-meta{text-align:left;}
    .scale-row{grid-template-columns:repeat(5,1fr); gap:5px;}
    .scale-opt .desc{display:none;}
    .rec-row{grid-template-columns:repeat(2,1fr);}
    .packet-name{font-size:23px;}
    .hero-card{padding:26px 20px;}
    .hero-title{font-size:26px;}
  }
</style>
</head>
<body>

<div id="scrim" onclick="closeSidebar()"></div>

<div id="app">
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sb-header">
      <p class="sb-eyebrow">NoCo Changemakers · 2026/27</p>
      <h1 class="sb-title">Applicant Evaluation</h1>
      <p class="sb-sub">21 applicants · rubric-based reviewer scoring</p>
    </div>

    <div class="sb-evaluator">
      <label for="ev-name">Your name</label>
      <input type="text" id="ev-name" placeholder="Evaluator name">
      <label for="ev-email">Your email</label>
      <input type="text" id="ev-email" placeholder="you@organization.org">
    </div>

    <div class="sb-progress-wrap">
      <div class="sb-progress-label">
        <span>Reviewed</span>
        <span><span class="sb-progress-count" id="progress-count">0</span> / 21</span>
      </div>
      <div class="sb-progress-track"><div class="sb-progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>

    <nav class="sb-list" id="sb-list"></nav>

    <div class="sb-footer">
      <button class="sb-export-btn" onclick="exportCSV()">⬇ Export scores (CSV)</button>
      <button class="sb-reset-link" onclick="confirmReset()">Clear all my responses</button>
    </div>

<script id="data-json" type="application/json">
{"applicants": [{"name": "Anique Mautner", "positionTitle": "Marketing & Strategy Director", "employer": "MiresBall Brand Design", "email": "anique.mautner@gmail.com", "phone": "(858) 952-6354", "howHeard": "Referral from NoCo Foundation board or staff", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6583796963524606164/AMautner-Resume.pdf", "challenge": "As a newer resident to Fort Collins, I've spent time listening to local community leaders in the private and public sectors and found that, like many growing communities, Northern Colorado is navigating housing affordability, childcare access, and increasing pressure on nonprofits asked to do more with fewer resources. Rapid growth places a strain on community connection and belonging, something I've experienced personally. \n\nPhilanthropy has an important role to play both as a source of funding and a connector that aligns stakeholders, surfaces shared priorities, and supports collaborative, long-term solutions that individual organizations cannot achieve alone.\n\nI bring experience helping mission-driven organizations address these kinds of complex challenges through strategy, storytelling, and partnership: OneSD brought cross-sector partners together to address social division; and SunCoast Co-op Market residents organized to bring healthy food to an underserved area. I'm excited to contribute those skills here \u2014 and believe NoCo Changemakers is the ideal opportunity to expand my personal impact in my new hometown.", "leadership": "As Marketing & Strategy Director at MiresBall, I collaborated on the strategic rebrand of San Diego Foundation and later guided its 50th Anniversary campaign, helping communicate the foundation's long-term vision and build trust in the community. The work contributed to a 30% increase in positive brand perception during the first year and supported the foundation's ambitious campaign toward its $1 billion fundraising goal.", "collaboration": "In my work with a community foundation leadership team, I helped facilitate conversations among executives, board members, and creative partners through a complex rebranding process. My role was to create space for every voice while keeping the group focused on shared goals. The experience built trust among stakeholders and creatives, allowing us to move through the process together towards a new brand that everyone could support.\n\nExtending this further, I\u2019ve seen firsthand how critical collaboration is in effective philanthropy, especially bringing people together with different priorities and perspectives. Community foundations are uniquely positioned to build trust, align donors around shared priorities, and strengthen partnerships across sectors. I\u2019m especially interested in how collaborative philanthropy can create lasting systems-level change instead of isolated, short-term solutions.", "hopeToGain": "Having moved to Northern Colorado, I'm looking for meaningful ways to invest my time and skills in the community I now call home. I hope to build relationships with people who are deeply engaged in local challenges, learn how philanthropy works at the regional level, and better understand where my experience in strategy, storytelling, and nonprofit partnerships can be most useful. I also hope to become a long-term contributor to Northern Colorado's civic and philanthropic community.", "optionalDetail": "Throughout my career, I've helped mission-driven organizations articulate who they are, why they matter, and how to show up with clarity and humanity. Professionally, I bring experience in strategy, communications, facilitation, and consensus-building. Personally, I'm looking for a place to contribute over the long term.", "references": "John Ball: john@miresball.com / (619) 994-6632; Christa Martin: cmartin@chiefoutsiders.com / (858) 775-2652"}, {"name": "Anselma Lopez", "positionTitle": "Fundraising & Event Supervisor", "employer": "Town of Windsor", "email": "anselma.lopez@gmail.com", "phone": "(719) 469-6711", "howHeard": "Referral from Changemaker alumni  -  Referral from NoCo Foundation board or staff", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6583073273615441522/Anselma Lopez Resume.pdf", "challenge": "Northern Colorado offers strong programs for youth and families, yet adults in their 30s\u201340s\u2014especially those without children\u2014often lack meaningful pathways to connect and engage. This gap limits social cohesion and reduces opportunities for civic participation among a large demographic that wants to contribute but doesn\u2019t always know where to plug in. Seed funding, capacity building, and pilot projects targeting this audience can help communities in Northern Colorado test new engagement strategies, strengthen social ties, and create spaces where more residents feel connected and invested. Philanthropy can play a catalytic role by supporting innovative models that broaden who feels welcome, included, and empowered in our region.", "leadership": "When I moved to Northern Colorado, I took the initiative to establish a regional CU Alumni group to foster connection among new and longtime residents. I developed outreach materials, recruited a core membership base, and organized events that brought together up to 50 alumni at a time. One of my proudest accomplishments was launching a local scholarship program for area students attending CU Boulder. I led fundraising efforts, coordinated donations, and helped select recipients whose values aligned with our mission. I built the group with sustainability in mind and ensured strong succession planning so the organization remained active after my leadership term ended. This experience taught me how intentional program design can create lasting community impact.", "collaboration": "As part of the Board of Advisors for Mile High Young Professionals, I supported our philanthropy committee in integrating meaningful community impact throughout the organization. I helped identify nonprofits aligned with our mission, coordinated logistics, and worked closely with our marketing team to promote participation. Each year, we partnered with more than a dozen nonprofits\u2014hosting them at monthly socials, organizing volunteer shifts at food shelters and Habitat for Humanity, and coordinating our winter boot drive for elementary students. We routinely maxed out volunteer slots, strengthening our relationships and demonstrating our group\u2019s reliability. This experience taught me the value of shared purpose, consistent communication, and creating accessible opportunities for people to give back.", "hopeToGain": "I hope to deepen my skills in community engagement, donor fundraising, and philanthropic strategy. As I grow in my role, I will be leading Windsor\u2019s Reimagine initiative, a philanthropic endeavor centered on strengthening belonging and resident connection. I want to learn from peers and leaders across Northern Colorado who are navigating similar opportunities and challenges. Through the program, I hope to expand my network, gain practical tools, and strengthen my ability to design programs that reflect community voice. Becoming a NoCo Changemaker will help me bring fresh ideas and renewed energy back to Windsor.", "optionalDetail": "I am passionate about building inclusive communities and have experience turning ideas into sustainable programs. My background includes event planning, volunteer coordination, and strengthening regional partnerships. I bring a perspective informed by working with diverse resident groups and designing engagement opportunities for demographics often overlooked in traditional programming. I would value the opportunity to learn, collaborate, and contribute alongside other emerging leaders through the NoCo Changemakers program.", "references": "Brittany Pearce, 731-661-1050, brittany.e.pearce@gmail.com (Board experience). Laura Browarny, 970-674-3521, lbrowarny@windsorgov.com"}, {"name": "Bethany Geisert", "positionTitle": "Director of Operations", "employer": "Waypoint Real Estate", "email": "bgeisert@waypointre.com", "phone": "(970) 420-2166", "howHeard": "First from Lyndsey Hertz and James Hamilton during a meeting, and again from Hilary McCart, Steering Committee for the program", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6583251912029710269/Bethany_Geisert_Resume_2026.pdf", "challenge": "Childcare access and housing affordability are connected challenges for working families in Northern Colorado. When housing costs consume a large portion of a household budget, most families need two incomes to stay here. That leaves parents with young children stuck between daycare costs they can't afford and a single income that doesn't stretch far enough. That assumes that parents can find suitable childcare at all. The ripple effects of these challenges go beyond individual families. In addition to these pressures negatively impacting mental health and quality of life across the community, there are risks to our local business economy, and when parents of young children can't make it work here, they leave. That's a direct loss for local employers competing for working-age talent. I think there is an opportunity for philanthropy to play a role in advocacy around this challenge, and in connecting employers, public funding, childcare providers, and community leaders in an effort for shared solutions.", "leadership": "I am fortunate to work for an organization that supports giving back to our community, and am able to regularly volunteer for my children's elementary, reading to K-4th graders. In addition, I volunteer in my church's meals ministry outreach, where we come together to care for others through meal preparation and delivery. Lastly, for several years, I have been a youth volunteer coach for baseball and basketball teams. With youth coaching, it is a privilege to introduce young children to the character development, teamwork, respect, and confidence that participation in sports can provide. I believe their first introduction to team sports can pave the way for the way they navigate the world, challenges, and social interactions. I like to believe that my positive and encouraging coaching approach helps young children gain confidence and want to come back for more.", "collaboration": "Through my organization, Waypoint Real Estate, we host a 0.5K Run for RamStrength, a 1/2 kilometer \"race\" benefitting RamStrength. We have put this event on for 5 years, and it continues to grow in impact and reach each year. From the inaugural year and for every year since, we collaborate RamStrength, the venue (CSU), and with our local business community in securing sponsorships and attendees. In addition, we have an event committee that helps coordinate volunteers, funds raised, press, photographers, and more. While in the early years of the event, our committee was small, and I led most of the efforts, we've been able to grow it over the years where each role can play to their strength. What I've learned is that delegation and specialization is a beautiful thing when you let people opt in to play to their strengths and then let them get creative with their solutions. My role as it stands this year is largely strategic in nature, specializing in connecting with local businesses for sponsorship requests.", "hopeToGain": "I am eager to learn about how the work in our community actually gets done. I have a genuine interest in the challenges that face our community, but I don't yet have a deep understanding of how philanthropic dollars move through our community, and how decisions get made. I would love to meet people who are also thinking seriously about Northern Colorado's future. Lastly, there are so many wonderful non-profits doing great work in our community, and I think there is a real opportunity for matchmaking skillsets and passions to nonprofits' needs, but nonprofits often don't have the bandwidth or voice to be discovered, because they're busy doing the great work! I think it's our responsibility as a community to highlight the work they do and shine light on it for people that want to give back and help and don't know where to start.", "optionalDetail": "A few years ago, I went through Leadership Fort Collins (Hi Mary!), and really enjoyed learning about our community. I look forward most to learning and connecting with others in a program like this. Lastly, I heard about this program first when meeting with Lyndsey Hertz and James Hamilton a few months ago, and then again from Hilary McCart today, who I understand was on the Steering Committee for this program. I appreciate your consideration.", "references": "Josh Guernsey, Waypoint Real Estate, jguernsey@waypointre.com, 970-218-2331; Jerick Flores, Waypoint Real Estate, jflores@waypointre.com, (303) 260-9504"}, {"name": "Carrie Rossman", "positionTitle": "Conservation Leadership Scholar & Seminarian", "employer": "National Caucus of Environmental Legislators; CSU; & Garrett Evangelical Theological Seminary", "email": "ctycolorado@hotmail.com", "phone": "(970) 888-1071", "howHeard": "LinkedIn", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6571048614526350013/Rossman_C_Resume.pdf", "challenge": "I grew up in Northern Colorado and see the most critical challenges for our Northern Colorado community as 1) water, how we conserve and equitably utilize this diminishing resource in the context of the prior appropriation doctrine; 2) affordability, most critically for basic services like food, housing and childcare; 3) education from preschool through higher education; and 4) natural space appreciation and protection. I believe that by addressing these challenges, we can collectively live into our vibrant and unique Northern Colorado lifestyle. \n\nPhilanthropy can and does invest resources to combat the above listed challenges, and it can also play a convening role to bring together different voices in order to collaboratively address challenges. An example of this is the way so many organizations came together over the years to make the recently completed Poudre River Regional Trail Initiative, all 45-miles of it, a reality.", "leadership": "During my time with BBB Serving Northern Colorado and Wyoming, I spearheaded a partnership with United Way of Larimer County, and later United Way of Weld County, to ensure all United Way funded nonprofits in the community met the BBB\u2019s charity accountability standards in the areas of governance and oversight; effectiveness measurement; finances; and fundraising and information materials. This partnership strengthened the nonprofit community in Northern Colorado as my team and I provided education, and evaluation, on best practices in charitable accountability. The partnership was recognized with an Outstanding BBB award from the Council of Better Business Bureaus.", "collaboration": "In 2022, YMCA of the Rockies\u2019 CEO and I were approached by a donor who wanted to start an endowment to fund the YMCA\u2019s childcare program, serving local children year-round, ages 1-5, and YMCA guests in the summer. Estes Park is a childcare desert, so we jumped at the offer. Together with the donor and our staff we renewed, strengthened and expanded the childcare program.\n\nI led the stewardship efforts for the endowment donor family, to report on the use of funds and to showcase the positive impact of the endowment. With additional donors, the State of Colorado and Town of Estes Park I led the efforts to find more resources for capital improvements, staff training, and special needs services for the childcare program and day camp. The vision of one donor joined with the hearts and hands of many ensures Estes Park will have childcare services for generations to come.", "hopeToGain": "As Chief Advancement Officer for YMCA of the Rockies, and in other roles prior I embraced the opportunity to build relationships and invite individuals, families, foundations and corporations to make philanthropic investments. Matching a giving passion to a nonprofit need is stars aligning and it feels a little like magic.\n\nNow, the tables have turned, and I get to be a philanthropist. My husband and I have started our own small, donor advised fund (DAF); and my extended family and I have established a memorial DAF to honor the life and character of my late father, Rex King.\n\nAs a NoCo ChangeMaker I seek to learn best practices in philanthropy, to embrace community convening and to share, with my fellow ChangeMakers, the fundraiser perspective. Moreover, as a Northern Colorado resident, I seek to be a force for good in our community.", "optionalDetail": "I believe in lifelong service and learning. I am a program graduate of Water Literate Leaders, 2023, hosted by the Community Foundation and the Colorado Water Center. At present, I am a master of conservation leadership candidate at CSU, graduating in December; and I will commence seminary studies online this fall. \n\nI also currently serve on the City of Loveland Sustainability and Climate Task Force and as a giving and grants advisor to my church, First Congregational United Church of Christ in Greeley, CO. \n\nBecoming a NoCo ChangeMaker will complement my current studies and volunteer service and build upon my career with nonprofits that seek to make the world better through their missions. Thank you for your consideration.", "references": "Pam King, President/CEO (retired), BBB Serving Northern Colorado and Wyoming, pamking6320@gmail.com, 970.290.7091; Lauren Watel, President, Schlessman Family Foundation, lauren.watel@gmail.com, 303.947.1697"}, {"name": "Hilary McCart", "positionTitle": "SVP, Benefits Consultant", "employer": "Gallagher", "email": "Hilary_McCart@ajg.com", "phone": "(970) 568-2110", "howHeard": "Referral from NoCo Foundation board or staff", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6582555573227000063/Hilary McCart Resume.pdf", "challenge": "In Northern Colorado, it can be difficult for individuals and families to meaningfully engage in giving back to their community. There are many wonderful nonprofits doing important work, but getting involved often requires people to search, evaluate, and navigate multiple organizations on their own. \n\nIn my experience, most people genuinely want to give back, especially families, but aren\u2019t sure where to start or how to stay consistently involved. \n\nPhilanthropy has an opportunity to help simplify that experience by creating more visible and accessible pathways for engagement. This could include more centralized, user-friendly ways to connect people with opportunities that align with their specific interests and values. \n\nBy making it easier for individuals and families to participate, philanthropy can help build a stronger culture of connection, generosity, and long-term community impact.", "leadership": "Earlier in my career, I served as a board member for CASA of Larimer County, where I had the opportunity to take on several initiatives to support the organization\u2019s growth. I helped lead the development of a company matching program to encourage broader participation in giving and to amplify the impact of individual contributions. I also worked with the board to evaluate alternative spaces as the organization outgrew its existing footprint.\n\nBoth efforts were rooted in creating greater capacity, financially and operationally, to support CASA\u2019s mission of advocating for children in our community. By expanding funding opportunities and helping position the organization for growth, these initiatives contributed to CASA\u2019s ability to serve more children and families effectively.\n\nMore recently, my leadership has shifted closer to home through coaching youth sports and staying actively involved in my community.", "collaboration": "One example of meaningful collaboration has been my experience as a Vistage member, where a group of leaders come together regularly to support one another\u2019s growth and decision-making. In this setting, my role has been both a contributor and a peer advisor, bringing real-time business challenges, while also helping others think through theirs.\n\nWhat made this experience impactful was the level of trust and accountability within the group. By asking thoughtful questions, offering perspective, and at times challenging assumptions, I was able to contribute to better outcomes for others while also gaining valuable insight myself.\n\nI learned that effective collaboration is not about having the right answers, but about creating space for better thinking. That same approach, shared ownership and mutual investment, translates directly to effective philanthropy.", "hopeToGain": "I hope to gain a stronger connection to the Northern Colorado community and a deeper understanding of where I can make a meaningful impact. While I\u2019ve been involved in different ways over time, I\u2019m at a stage where I\u2019m looking to be more intentional about how I engage and give back.\n\nI\u2019m particularly interested in learning from others who are equally committed to making a difference, and in better understanding the needs and opportunities across our region. I value environments like this that challenge thinking, offer diverse perspectives, and create space for both reflection and action.\n\nI also hope to contribute my own perspective, particularly around building connections and simplifying ways for people to engage. Ultimately, I\u2019m looking to grow alongside a group of peers while becoming more thoughtful and effective in how I support my community.", "optionalDetail": "Thanks for the opportunity!", "references": "Nancy Girres, Nancy Girres, nancy@nancygirres.com, 970.566.2001; Tom Harper, tom.harper@assuredpartners.com, 706-338-1437"}, {"name": "Jessica Quintana", "positionTitle": "Community & Member Relations", "employer": "Poudre Valley Rural Electric Association", "email": "jquintana@pvrea.coop", "phone": "(719) 239-0704", "howHeard": "Referral from Changemaker alumni  -  Chamber of Commerce communication  -  Referral from NoCo Foundation board or staff", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6583186518999459382/Quintana_Resume_COMMUNITY AND MEMBER ENGAGEMENT.pdf", "challenge": "Housing. The cost of living keeps rising, wages don't follow the same trend. Stable house changes everything for a family. It supports stronger families, healthier communities and long-term economic stability. Philanthropy can play a role by assisting those in need financially that puts them one step closer to that stability.", "leadership": "A meaningful example is my work building and leading PVREA's Ambassador Program. I recognized an opportunity to better engage employees in the community while fostering a culture of service and professional development. This program is now three years old, there have been over 45 participants, we have expanded engagement in our communities, and created opportunities for employees to grow personally and professionally.", "collaboration": "After the Cameron Peak Fire and Black Hollow flood, I led PVREA's Innovation Team in a partnership and tree planting days with Coalition for the Poudre River Watershed (CPRW). This restoration work was a community-wide effort and I learned about CPRW in general as I was unfamiliar prior to this project. I learned about the process of recruiting volunteers outside of our normal scope. I learned that this cross-organization collaboration was reliant on community participation and partnerships from our whole region.", "hopeToGain": "I hope to gain knowledge about the different organizations I don't know about along with the process of grantmaking. I'd like to understand on a deeper level how nonprofits work with each other and what types of outlooks are down the pipeline.", "optionalDetail": "In my role at PVREA, I\u2019ve had the opportunity to lead and support initiatives that bring together nonprofits, schools, and local partners to create meaningful, lasting impact whether through scholarship programs, community partnerships, or volunteer engagement.", "references": "Amy Rosier - arosier@pvrea.coop, 7206268297"}, {"name": "Kaitlin Bjork", "positionTitle": "Development Director", "employer": "Respite Care, Inc.", "email": "Kaitlin@respitecareinc.org", "phone": "(970) 402-4322", "howHeard": "Chamber of Commerce communication", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6565066885514001351/Kaitlin Bjork_Resume_NoCo Changemakers.pdf", "challenge": "One challenge I see in Northern Colorado is that growth has not been felt evenly across our communities. We are in a region that is growing quickly, with new jobs, development, and opportunity, but not everyone is benefiting in the same way. For many people, especially those in lower-income households and some rural areas, things like affordable housing, childcare, and access to training or stable employment are still real barriers to getting ahead.\n\nWhat stands out to me is that these are not isolated issues. They are connected. If someone is struggling with housing or childcare, it affects their ability to stay in a job or pursue education, which then affects long-term stability.\n\nI think philanthropy has a unique role here because it can move more quickly and take more risks than other sectors. It can support innovative ideas, help local organizations that are already trusted in the community, and bring different partners together to work toward shared goals instead of working independently. Just as importantly, it can help make sure the people most affected by these challenges have a voice in shaping the solutions.\n\nFor me, the opportunity in Northern Colorado is making sure growth feels more inclusive so that more people are not just living here, but actually able to build stable, thriving lives here.", "leadership": "In my community, I helped lead our most recent capital campaign to build a new Respite Care facility. We raised $12.3 million toward a $12 million goal, which allowed us to fully fund a much-needed space for individuals and families in our community.\n\nMy role included donor cultivation and stewardship, making direct asks for gifts, and organizing key campaign events that helped keep momentum and engagement throughout the process. I helped coordinate a Kick-off Event, Groundbreaking, multiple donor appreciation events, and the Ribbon Cutting. I also stayed involved in ongoing donor communication and relationship-building throughout the campaign, not just around events.\n\nA big part of the experience for me was learning how personal fundraising actually is. The asks were not just about dollars, they were about clearly connecting people to the impact they could have. The events and follow-up helped reinforce those relationships and keep people connected to the work over time.\n\nThis experience reinforced for me that leadership is really about consistency, relationships, and helping people stay connected to a shared goal that makes a real difference in the community.", "collaboration": "A good example of collaboration for me was helping launch our Legacy Circle program. This was a new initiative, so a lot of the early work involved learning from and working with others to build it in a thoughtful way.\n\nI met with planned giving professionals to better understand best practices and what makes legacy programs successful. I also connected with other nonprofits that already had similar programs to learn from their experience and get practical feedback on what worked and what did not. In addition, I attended planned giving trainings to build my own understanding of the space.\n\nInternally, I worked closely with both staff and our Board to shape the structure of the program and make sure it reflected our organization\u2019s goals and values. I also collaborated with staff on the marketing and messaging so the program would be clear and accessible to donors.\n\nWhat I learned from this experience is that collaboration is not just about working together internally, but also about being willing to learn from others outside your organization. Building something new takes a mix of listening, adapting, and making sure different perspectives are reflected in the final outcome.", "hopeToGain": "As a NoCo Changemaker, I hope to gain a broader perspective on the challenges and opportunities facing Northern Colorado, especially from people working in different sectors and communities than my own. I am a third-generation Fort Collins native, so this region is not just where I work, it is home. Because of that, I care deeply about how it continues to grow and change.\n\nMy most recent experience has been in nonprofit development and fundraising, so I am interested in learning how other leaders approach issues like affordable housing, workforce development, and community health from different angles.\n\nI also hope to grow as a more thoughtful and effective leader by learning from the experiences of others in the group. I value the opportunity to step outside of my day-to-day work and reflect more intentionally on how collaboration can create stronger and more sustainable solutions.\n\nI would also hope to share my own experience in fundraising, donor engagement, and building community support. I have seen how important relationships are in turning ideas into action, and I would like to bring that perspective into conversations with others in the program.\n\nOverall, I see this as an opportunity to both learn and contribute, while becoming a more connected and effective leader in Northern Colorado.", "optionalDetail": "My connection to Northern Colorado is both personal and professional. I am a third-generation Fort Collins native, currently working and residing in Timnath, and I care deeply about how this region grows and changes over time. In my work in nonprofit development, I have seen how relationships and collaboration turn community ideas into real impact. I am interested in NoCo Changemakers because I want to learn from others working across different sectors while also sharing my experience in building support for community priorities.", "references": "Kristi Briles, Kristi@respitecareinc.org, (970) 207-9435"}, {"name": "Karen Jackson", "positionTitle": "Outreach Director", "employer": "Estes Nonprofit Network", "email": "pinesapstudio@gmail.com", "phone": "(303) 902-4695", "howHeard": "Referral from NoCo Foundation board or staff", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6583284140117693291/KarenMJackson_Resume_Comms.pdf", "challenge": "Northern Colorado is not unique in the diversity of social causes and desperate needs. It's hard to choose one specific issue. However, I do see workforce development and upskilling as a unifying need that, if successfully addressed, helps resolve income/employment issues. Employers are the largest providers of health coverage, so increased employment helps reduce the state's Medicaid allocation. It potentially increases wages, which increases people's chances of affording housing in NOCO. \nPhilanthropy steps in where our government or corporate systems cannot (or will not). In this case, there is support from the government and corporations for workforce development. I see philanthropy as an instigator and connector for this issue, and possibly the best place to tell success stories.", "leadership": "When I moved to Estes Park, I developed and produced an Arts Studio Tour for five years. Amazing talent could easily be promoted to foster connections between locals and tourists alike. The studio tour leveraged the well-known fact that people want to feel an authentic connection to the community. This event invites them to drive down a dirt road and get into locals' home studios. Tourists covet their experience in Estes. Encouraging them to buy local art satisfies their desire to take a piece of Estes home and creates an income stream for local artists. This initiative became a program that uses a nonprofit as a fiscal sponsor and partners with destination marketing. The event is now in its 10th year.", "collaboration": "The Estes Nonprofit Network is sunsetting. My role is to create all SOPs and train the Estes Chamber of Commerce on the core programs they will absorb. I am in a delicate position that tethers together the interests of our board and honors our donors' private information while being transparent and gracious with the Chamber staff about the good, the bad and the ugly in executing programs. I am advocating that our audience support the Chamber while celebrating our team's deep dedication to building a stellar organization. Keeping multiple parties on track happens by focusing on the north star (setting nonprofits up for success), good governance, and legal documents. Personality and connection are also playing a key role in holding this process together.", "hopeToGain": "I would like to clarify how I can make the greatest impact. While asking for donations and \"making the case for support\" is a familiar chair to sit in, I am a skeptic donor: tight with my money, more inclined to leave a planned gift, and wary of how my money will be spent. I believe in trust-based philanthropy, but I am not sure the larger organizations I would like to support will actually feel my small change. And for the missions I am excited about, I am volunteering my time and talent\u2014but this dedication conflicts with the need to make money to give! What is the best allocation of my resources?", "optionalDetail": "As I look at new positions that may lean more towards marketing and communications, I may lose philanthropy as part of my day job. I see Changemakers as a way to develop a network of philanthropy friends and stay close to giving. It's also time for me to craft a giving plan that feels less sporadic and reactive. I would like to continue to be an advocate of giving back and be a model for peers.", "references": "Claire Bouchard and Jodie Riesenberger"}, {"name": "Kari Lynch", "positionTitle": "Supervisor, communications, community relations, public education", "employer": "Platte River Power Authority", "email": "lynchk@prpa.org", "phone": "(970) 690-6478", "howHeard": "Coworker Leigh Gibson is a member of Leadership Northern Colorado and learned about NoCo Changemakers, she recommended to me based on my role.", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6582220315219174141/Kari Lynch Resume 2026.pdf", "challenge": "A challenge facing Northern Colorado communities is balancing affordability and the transition to a noncarbon energy future. At Platte River Power Authority, we see this not just as a challenge but as an opportunity to lead thoughtfully. Strong connections with the nonprofit community are essential for Platte River because they provide trusted, on-the-ground insight into community needs, help extend the reach of programs and ensure that energy initiatives are designed and delivered in ways that are equitable, accessible, and responsive to those most impacted by affordability challenges. The goal is not simply to transition to cleaner energy, but to do so in a way that is equitable and reflective of community needs.", "leadership": "In my role at Platte River, I demonstrated leadership by spearheading a workforce development initiative in partnership with local schools. I coordinate opportunities for students to learn about careers in the energy industry by organizing presentations, connecting them with a diverse group of employees, and showcasing pathways into trade and STEM careers.\n\nThis effort contributed to positive change by increasing awareness of accessible, local career opportunities. It also created meaningful engagement for our employees, who have found a great deal of value in supporting and inspiring the next generation. That enthusiasm has helped expand the program into additional opportunities, such as job shadowing, further strengthening connections between students and real-world career pathways in our region.", "collaboration": "I successfully collaborated with others through my leadership of Platte River\u2019s United Way of Larimer County fundraising campaign. I led a committee of employees representing different departments, coordinating planning, communications and engagement activities to build momentum across the organization.\n\nMy role was to set the vision, communicate with leadership, organize the team\u2019s efforts and ensure everyone had clear opportunities to contribute. By fostering a collaborative, inclusive approach, we created a strong sense of shared ownership, which helped us achieve an award-winning campaign and raise over $100,000.", "hopeToGain": "As a NoCo Changemaker, I hope to build meaningful connections across the region and deepen my understanding of the challenges and priorities facing our local nonprofit and partner community. By learning directly from those doing this work, I can be a stronger, more informed voice for their needs and perspectives. I also hope to apply those insights to evolve and grow Platte River\u2019s community support programs in ways that better support these organizations and ensure our efforts are impactful and aligned with the communities we serve.", "optionalDetail": "I believe I bring a unique perspective to this group through my role at Platte River Power Authority. As a public power entity, we operate with a strong sense of responsibility to serve our communities and prioritize what\u2019s best for the public good. That lens shapes how I approach partnerships, philanthropy, and community engagement.\n\nI\u2019m especially interested in NoCo Changemakers as an opportunity to connect that perspective with the work of local nonprofits\u2014learning from them while also making sure community needs are reflected in the programs and initiatives I help support.", "references": "Ellie Benjamin: ebenjamin@uwaylc.org, 970-407-7035 (VP of development at United Way of Larimer County) Kendal Perez: perezk@prpa.org, (970) 229.5304 (senior manager, communications, community relations and public education at Platte River Power Authority)"}, {"name": "Kimberly O'Neil", "positionTitle": "Director", "employer": "Max West Inc.", "email": "kim@maxwestinc.com", "phone": "(970) 214-3113", "howHeard": "Referral from Changemaker alumni  -  Chamber of Commerce communication", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6583179908453882936/Kimberly_O_Neil_Resume.pdf", "challenge": "One challenge I have observed and been involved in is providing access to youth sports.  In Northern Colorado there is a shortage of both public and private court and field space available which drives up rental prices and causes competition and increased fees for kids to participate.  This ends up making youth sports and camps an elite activity which it should ideally be accessible to all kids for fun, for healthy bodies, and for all the benefits that team sports can bring.  What we are seeing in other cities is more government groups, non-profit organizations, sponsors and donors working together to provide support, subsidies and scholarships to make youth sports affordable and accessible.", "leadership": "I spent 15 years at Encompass Technologies as an HR and Operations leader.  We experienced tremendous growth during that period and I am very proud of building a strong employer in the Northern Colorado community.  One of the initiatives we created after building up a team in China was to host annual summer camps in Fort Collins for the children of our US and China employees.  The kids had the opportunity to experience each others' cultures, gain exposure to new languages and food and activities.  The kids that were involved have created and maintained lifelong friendships and gained a deeper understanding of the world around us.", "collaboration": "Accomplishing almost anything in business and community and philanthropy requires collaboration and team work.  One of the biggest projects I've worked on was the design and hosting of the annual Encompass user group meeting.  This started as a small 30 person conference into a event hosting over 300 people.  This took internal collaboration within the company across all teams to create schedules, agendas, content and marketing as well as coordination with vendors, venues, guest speakers, attendees, and city officials.  I learned to be flexible, stay calm, and to use the team of experts we had gathered.  Each year was better than the last and it was a wonderful way to showcase Fort Collins to our customers from all over the US.", "hopeToGain": "I am in a new phase in my life as a business investor and advisor rather than a full-time executive.  Philanthropy is not an area I've had extensive exposure to in the past, so I am excited to learn more about the ins and outs of becoming an effective philanthropist.  I am also looking forward to learning more about what others are already doing in the community and what opportunities exist to work together and magnify our impact. The previous cohorts are made of amazing community members so I am also eager to meet new people and make real connections in the community.", "optionalDetail": "I have lived in Colorado my whole life and Northern Colorado for 27 years.  I am committed to making Northern Colorado a great place for real people, for families and for businesses.  Max West Inc. is the holding company my husband and I have created for business investing and advising since our exit from Encompass and I am eager to gain more knowledge about out to incorporate philanthropic efforts into our family office. My schedule is flexible and I do not anticipate any issues with the time commitment for Changemakers.", "references": "Bill Kraich 970-405-4179, mr.kraich@gmail.com and Curt Bear 970-218-3186 curt@locothinktank.com"}, {"name": "Leticia Lucio", "positionTitle": "Retired Probation Officer", "employer": "Larimer County Probation", "email": "leticia_lucio@hotmail.com", "phone": "(970) 203-5513", "howHeard": "LinkedIn", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6583179874384416430/Resume 2026.docx", "challenge": "Two that I have found is the health insurance coverage for cochlear and BAHA (bone anchor hearing aid) for individuals. I personally, having been born with one ear, has a BAHA on one side and regular hearing aid on the other side. Also, the state has clinic in Aurora, CO for Turner's Syndrome, and my hope is to gain wrap around support, including financially, to build and provide such services in Northern Colorado. I was diagnosed with TS at the age of 45, and it is prevalent to girls/females and the need to have the checklist at a younger age is dire to the developments in all areas for life.", "leadership": "I was involved in Family Leadership Training Institute in 2013 and created a vision OYE (Own Your Experience) focused on discussing with legislation to revamp health insurance coverage for all. Also, I was a Peace Corps Volunteer in Boaco, Nicaragua, Central America working with my counterpart in event planning, budget planning, organizational development, in providing services and activities for young teen males huffing rubber glue and teen girls encouraged to engage in prostitution as financial contribution to family systems.", "collaboration": "I worked with the Urban Youth Development Sector volunteers from my group in Nicaragua to draft a grant to US AID to fund a weekend retreat for teen girls with breakout sessions focused on team building, conflict resolution, communication, health decision making to name a few. Furthermore, in college, i worked with a team during my Senior Seminar to draft a grant for Lambda Center, 30 years ago in Larimer County, to fund same sex parenting classes. In my recent career as a Probation Officer, i was member of the Wellness Committee. Although I provided translating and interpreting services throughout my career path, as of late, since retiring in March 2026, i made it official as an LLC, Shedding Light to Change, a one-stop shop for translating needs in Spanish and English.  SLC is founded on the basis of providing high-quality bilingual translating services to an array of clientele, including Government, medical, legal, non-profit, corporate, and technical contract backgrounds.   SLC is designed as a web-based company, such that communication, transfer, and retrieval of information can be steadily handled via email and the Internet securely.  \n\nDue to this flexibility and convenience, SLC is able to offer highly competitive quotes in-line with market level pricing for this specialized service no matter where your office resides.", "hopeToGain": "Networking, knowledge from those already in the thick of it all, and prevention of reinventing the wheel.", "optionalDetail": "I graduated from CSU in 1998 with a degree in Human Development and Family Studies, with an emphasis in Spanish and Criminal Justice. I am bilingual, resourceful, and passionate about community. I am currently helping two friends navigate the process of caring for an elderly parent, by connecting them to resources with the goal of wrap around services for their loved one. An experience I am too familiar with in doing five years ago, for my own mother.", "references": "Karla Silvernale (k5silver@yahoo.com; 303-909-3398) and Tracy Tope (tracy.andersontope@judicial.state.co.us; 720-339-5127) Tracy Tope"}, {"name": "Megan Greer", "positionTitle": "Executive Director", "employer": "FoCo Cafe", "email": "megan@fococafe.org", "phone": "(970) 988-0933", "howHeard": "Referral from Changemaker alumni  -  Chamber of Commerce communication", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6583238716515274039/MEGAN GREER.Resume2026 (1).pdf", "challenge": "Affordability and preventative wellbeing initiatives are the biggest opportunities I see facing our region. Our Social Determinants of Health (SDOH) are becoming more and more out of reach for many, especially those on the ALICE borderline, benefits cliff (or who have lost benefits completely), or living below the poverty line.  Organizations are going to need to work comprehensively together to hold individuals and families up in innovative ways. We have incredible opportunities to capitalize on our collective abundance to ensure that areas where we can mitigate household expenses (like food, transportation, and clothing) by increasing free/low cost access are elevated. \nOf all communities, I believe Fort Collins residents truly want to be inclusive and part of the solution. We have a real opportunity to stop building or perpetuating parallel systems where those who have are separated from those who don't and we, instead, start bringing people together to participate in one system that allows a community give-and-take where everyone has greater access.", "leadership": "Prior to returning home to Fort Collins, I served as Executive Director of Blue Zones Project in Naples, Florida. My specialized focus was food policy and security. When our community was devastated by Hurricane Ian, I called all the partners in the food industry together to coordinate an emergency action plan for food distribution and access. This ranged from local/regional farmers to corporate distributers, churches, food banks, school districts and all food industries in between. Within 24 hours, we had sites established, refrigeration and storage secured and distribution models lined out that could get to areas where people were isolated or immobile due to damage or flooding. \nThis process and activation served as a model moving forward that the Emergency Operation Centers now use in Southwest Florida.", "collaboration": "I believe effective philanthropy is all about storytelling. When you can help donors and participants truly understand and experience the WHY behind the ask, or the impact that their contribution will make, the funding generally flows easily. \nI am currently collaborating with three different nonprofits, two farmers, and five businesses to host a fundraiser that highlights the intersection of homelessness, food-insecurity, and supporting local agriculture. Each is impacted by the other and they all benefit when one improves. We are focusing on returning to preventative wellbeing initiatives through healthy food access, grounding - by being on the farm- and sharing stories of success that are founded in the power of one finding their community and becoming connected to it. \nI am learning that we all have access to so many resources and amazing partners, so when we work together, the sky is the limit.", "hopeToGain": "My greatest hope is to develop and pilot successful models that allow us to implement preventative wellbeing initiatives that result in cost savings for employers, families and individuals while breaking down parallel systems that are already under attack. Threats or full discontinuation of access to SNAP, HUD, Medicare/Medicaid etc. will have trickle down effects that will last for years. \nNow is the time to start building systems that work and address the root causes of our declining SDOH and I hope to do so as a NoCo Changemaker.", "optionalDetail": "I'm often described as someone who \"sees everything\" when it comes to how and why a system works the way it does, and how it could be changed to be more accessible, inclusive, and effective. I LOVE to work toward change and innovation to better serve the community and I am so excited at the opportunity to participate in a space with like minded leaders that want to think outside of the box to ensure care for all.", "references": "Tessa LeSage, tlesage2@gmail.com, 239-218-0121, Matt Offutt, matthew.offutt@pnc.com, 303-775-7694"}, {"name": "Rachel Olsen-Towlen", "positionTitle": "Interim Executive Director", "employer": "Alliance for Suicide Prevention of Larimer County", "email": "rachel@imaginezerosuicide.org", "phone": "(303) 917-1849", "howHeard": "Referral from Changemaker alumni", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6577024571712830506/Most recent_R.Olsen-Towlen_Resume (1).pdf", "challenge": "An important challenge facing Northern Colorado is decreasing stigma around mental health, increasing access to care, and helping people feel like they belong. We can help break down the stigma around mental health and addiction, and encourage a culture of wellness, resilience, and connection through county-wide events, education, and communications focused beyond those working in behavioral health. The first step to building a healthy community is creating a safe space for honest dialogue about the real challenges in life, sharing stories, and learning that you are not alone. Every business, nonprofit, and community member has a role in changing how we approach mental health. Events such as the Teen Self Care Fair, The Caregiver Summit, Mental Health Matters nights, Music Festivals that incorporate mindfulness and somatic healing, Stay: A night of Metal (Music) and Hope are all examples of bringing people together to connect, heal, and learn coping skills. Philanthropy can help fund more community-building events, from neighborhood potlucks to H.O.P.E. Certification for businesses, to help create connection and belonging and break down the stigma and isolation felt by so many.", "leadership": "As the Deputy Director for the Alliance for Suicide Prevention of Larimer County and community lead for the Colorado National Collaborative (a collaboration between CDPHE, SAMHSA & CDC). My work focuses on increasing interagency communication and coordination of services, with the goal of creating a stronger and wider safety net of mental health support and suicide prevention in Larimer County. \n\nIn Larimer County, we have seen incredible changes across systems with intentional community collaboration. Through our efforts, we achieved a 27% decrease in suicide rates between 2019-2023. While 2024 brought disappointing news as our rates rose again, we saw another reduction in 2025, leading to a consistent decrease over time. Larimer County has been held up by state and national partners as an example of cross-sector collaboration producing results, and we know that with sustained effort and attention, we will continue our success over time.", "collaboration": "The very first Teen Self Care Fair (TSCF) was held in 2019. I have led the TSCF for 7 years, holding 8 fairs and planning the next one for this fall. We have watched its success grow from year to year. \n\nWhen planning the initial event, we set out to create a safe space for youth to learn new coping skills and join the conversation around suicide prevention through experiential learning. The TSCF is not just a fair; it's a crucial step toward addressing the pressing concerns of youth's rising mental health issues by providing youth with the coping skills, support, and resources they desperately require. The fair's multi-faceted approach offers hope and healing to our community's youth. \n\nTSCF would not be possible without our amazing community partners. Our service-provider-driven resource fair features local behavioral health organizations, providing an approachable, accessible venue for community members to find care for themselves and/or their loved ones. In addition to the resource fair, a wide range of programming engages youth in self-care practices and community-building activities, including yoga, sword fencing, art projects, mindfulness, skateboarding, pilates, poetry, meditation, and music. All led by community partners, dedicating their time and talents to help the next generation. Not only are activities free, but all attendees receive vouchers for one free meal from on-site food trucks. \n\n\nThe TSCF has been held 9 times, growing from 200+ youth in 2019 to over 1,000 people in the fall of 2024. The TSCF is accessible to all, with free entry, sessions, community resource booths, food, and giveaways. \n\nTSCF represents an exceptional collaborative process, engaging over 30 community-based organizations spanning local government, nonprofits, and businesses in a show of support for Northern Colorado youth. \n\nI have learned that when people have a place to come together, have fun, and learn new skills, it creates an incredible culture of care. I have been so honored to watch the TSCF grow over the years, and I can\u2019t wait to see how it evolves in the future, meeting new needs as they arise.", "hopeToGain": "I hope to learn more about collective change through collaboration. There are many issues with the non-profit industrial complex, so how can the community come together to make real and lasting change to break the cycles? In addition, how can we, as philanthropists, lighten the load and empower dedicated champions to do even deeper, more impactful work without the constant burden of fundraising and scarcity?", "optionalDetail": "", "references": "Kim Moeller, 970-420-7779, kimmoeller.co@gmail.com Ash Neufeldt, 785-317-2154, aislin.neufeldt@gmail.com"}, {"name": "Sara Potter", "positionTitle": "Branch Manager", "employer": "fnbo", "email": "spotter@fnbo.com", "phone": "(970) 690-2647", "howHeard": "Referral from Changemaker alumni", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6575356045024855633/Resume .docx", "challenge": "I would say the challenge is how our NoCO communities still feel a little siloed and not as collaborative as they should / could be - which gives us a big opportunity to partner together better.  Collaborating across communities through philanthropy will give all non profits the opportunity for more exposure for volunteers and donors.", "leadership": "I am a volunteer for the American Cancer Society.  For many years each community (Greeley, Windsor, Loveland and Fort Collins) had their own relay for life fundraising event that supports ACS.  In 2018 The local American Cancer Society office approached me about combining all of these events into one event and I helped spearhead the effort and chaired the event the first 2 years it combined all of these communities.", "collaboration": "Again with my volunteer role with The American Cancer Society I was able to work closely with another local fundraising event in our community and the ACS staff to work together in finding a solution for shared sponsors / donors between the 2 events. We found both events were trying to approach the same sponsors and everyone was being declined so we worked together on our approach that would benefit both events / ACS and enabled us to get bigger sponsor dollars.", "hopeToGain": "I'd love to learn more about the non profits and philanthropy opportunities in NoCo as I feel I am only scratching the surface of some great organizations and other ways to give back to our communities.", "optionalDetail": "I live in Loveland and work in Greeley, and was raised in Windsor so I am familiar enough with several of our communities!  I have extensive volunteer history (please see resume) and would love to learn about more opportunities as well as learn more about the grant writing process.  In my current board member role for The Greeley Family House and our current search for an E.D. we are having many conversations around grant writing that has opened my eyes about the opportunities and process of it all.", "references": "Sarah Farmer (director fnbo) 970-381-4744.  Jessica Wright (the american cancer society) 33-652-7076"}, {"name": "Susan Bricker", "positionTitle": "ECOM Associate", "employer": "Scheels", "email": "susan22bricker@gmail.com", "phone": "(970) 219-9095", "howHeard": "Referral from NoCo Foundation board or staff", "resumeLink": "https://www.jotform.com/uploads/communityfoundationnc/261256126770153/6567700077028816490/Susan Bricker Resume - 2026.docx.pdf", "challenge": "Tolerance and acceptance of others is a challenge for our community (as well as the country). Philanthropy can provide opportunities to underserved populations and exposure to experiences and perspectives that citizens might not otherwise be provided.", "leadership": "During the summer of 2024 I coordinated a block party in my immediate neighborhood with a band and food truck and invited all neighbors as well as guests to attend. It was an evening of fun and mingling and brought neighbors closer together which has been sustained 10 months later.", "collaboration": "Last summer I served as a volunteer table host for Longer Tables Denver event. Leading up to the event we had virtual host meetings to talk about expectations, share ideas for recruiting guests and coordinate day-of tasks.  It was an eclectic group of people coming together with vastly different experiences and motivations. Working together and allowing everyone to share input brought out the best collective ideas and helped us have a cohort to look forward to seeing at the day of the event.", "hopeToGain": "I am a big advocate for this community and look forward to learning about new opportunities to support it. I expect to be surprised learning about programs and people doing great work that haven't previously been on my radar.", "optionalDetail": "I think I may be in a unique age/employment position compared to other applicants. I was downsized by Otterbox in September 2025 and have accepted it as a semi-retirement. I worked as a seasonal tax preparer for H&R Block in early 2026 and now work part time at Scheels. T
